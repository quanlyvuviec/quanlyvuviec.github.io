// Build a complete, standards-compliant inline drawing paragraph for Word.
// cx/cy in EMUs (1 cm = 360000 EMU). docPrId must be unique across the document.
// align: 'left' | 'center' | 'right' (default 'left' to preserve cell alignment)
function _buildDrawingPara(rId, docPrId, cx, cy, align) {
  // Declare ALL needed namespaces on a single wrapper so Word never sees undeclared prefixes.
  // Using a real <w:p> with proper namespace refs that are already declared in <w:document>.
  // We keep inline xmlns only on the drawing root to stay self-contained.
  const jc = align || 'left';
  const pPr = jc !== 'left'
    ? `<w:pPr><w:jc w:val="${jc}"/></w:pPr>`
    : '<w:pPr/>';
  return (
    `<w:p>${pPr}<w:r><w:drawing>` +
    `<wp:inline xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"` +
    ` distT="0" distB="0" distL="0" distR="0">` +
    `<wp:extent cx="${cx}" cy="${cy}"/>` +
    `<wp:effectExtent l="0" t="0" r="0" b="0"/>` +
    `<wp:docPr id="${docPrId}" name="Picture ${docPrId}"/>` +
    `<wp:cNvGraphicFramePr>` +
    `<a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/>` +
    `</wp:cNvGraphicFramePr>` +
    `<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">` +
    `<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">` +
    `<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"` +
    ` xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">` +
    `<pic:nvPicPr>` +
    `<pic:cNvPr id="${docPrId}" name="Picture ${docPrId}"/>` +
    `<pic:cNvPicPr><a:picLocks noChangeAspect="1"/></pic:cNvPicPr>` +
    `</pic:nvPicPr>` +
    `<pic:blipFill>` +
    `<a:blip r:embed="${rId}"/>` +
    `<a:stretch><a:fillRect/></a:stretch>` +
    `</pic:blipFill>` +
    `<pic:spPr>` +
    `<a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm>` +
    `<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>` +
    `</pic:spPr>` +
    `</pic:pic>` +
    `</a:graphicData></a:graphic>` +
    `</wp:inline></w:drawing></w:r></w:p>`
  );
}

// ── Main export function ──────────────────────────────────────────────────
const exportWordTemplate = async (templateFile, caseObj, objList, selectedObjIndices, unitSettings, exportPerObj, singleObjIdx) => {
  if (!templateFile) return 'Chưa chọn file mẫu';
  try {
    const ab = await templateFile.arrayBuffer();

    // ── Try docxtemplater (preferred — no XML surgery) ──────────────────
    if (typeof PizZip !== 'undefined' && typeof Docxtemplater !== 'undefined') {
      try {
        const zip = new PizZip(ab);
        const doc = new Docxtemplater(zip, {
          paragraphLoop: true,
          linebreaks: true,
          nullGetter: () => '',   // undefined vars → empty string, không lỗi
        });

        const data = _buildTemplateData(caseObj, objList, selectedObjIndices, unitSettings, exportPerObj, singleObjIdx);

        doc.render(data);

        const blob = doc.getZip().generate({
          type: 'blob',
          mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
          compression: 'DEFLATE',
          compressionOptions: { level: 6 },
        });

        return { blob, filename: templateFile.name };
      } catch (dtErr) {
        // [OPT-4] Nếu docxtemplater lỗi (VD: template sai định dạng, placeholder sai cú pháp)
        // → fallback về engine JSZip thủ công thay vì treo app
        // Phân loại lỗi để người dùng biết cách xử lý:
        const errMsg = dtErr.message || '';
        if (errMsg.includes('Multi error') || errMsg.includes('Unclosed tag')) {
          console.warn('[Word Export] Mẫu Word lỗi cú pháp placeholder — thử JSZip engine:', errMsg);
        } else if (errMsg.includes('unexpected') || errMsg.includes('corrupt')) {
          console.warn('[Word Export] File mẫu bị hỏng — thử JSZip engine:', errMsg);
        } else {
          console.warn('[Word Export] docxtemplater failed, fallback JSZip:', errMsg);
        }
      }
    }

    // ── Fallback: JSZip manual engine (hỗ trợ {placeholder} truyền thống) ──
    return await _exportWordTemplateJSZip(templateFile, ab, caseObj, objList, selectedObjIndices, unitSettings);

  } catch(e) {
    console.error('Export word error:', e);
    return 'Lỗi xuất Word: ' + e.message;
  }
};

    // Simple image placeholders: {anh_chinh}, {anh_trai}, {anh_phai} (đối tượng đầu tiên)
    if (selectedObjIndices.length > 0) {
      const dt = objList[selectedObjIndices[0]];
      if (dt) {
        Object.entries(imgRels).forEach(([suffix, field]) => {
          registerImg(`{${suffix}}`, dt[field], `simple_${suffix}`);
        });
      }
    }

    // Replace each paragraph containing an image placeholder with a drawing paragraph.
    if (Object.keys(phToDrawing).length > 0) {
      xmlText = xmlText.replace(/<w:p[ >][\s\S]*?<\/w:p>/g, (para) => {
        for (const [ph, drawPara] of Object.entries(phToDrawing)) {
          if (para.includes(ph)) return drawPara;
        }
        return para;
      });

      // Patch relationships (awaited)
      if (addedRels) {
        try {
          let relsXml = await zip.file('word/_rels/document.xml.rels').async('text');
          relsXml = relsXml.replace('</Relationships>', addedRels + '</Relationships>');
          zip.file('word/_rels/document.xml.rels', relsXml);
        } catch(e) { console.warn('[Word Export] Could not patch .rels:', e.message); }
      }

      // ── CRITICAL: Update [Content_Types].xml with AWAIT (not .then) ──────
      // Bug fix: previous code used .then() without await → ZIP was generated
      // before the content-type was written → file corrupt / cannot open.
      try {
        const ctFile = zip.file('[Content_Types].xml');
        if (ctFile) {
          let ctXml = await ctFile.async('text'); // MUST be awaited
          for (const [ext, ct] of Object.entries(neededExts)) {
            if (!ctXml.includes(`Extension="${ext}"`)) {
              ctXml = ctXml.replace('</Types>',
                `<Default Extension="${ext}" ContentType="${ct}"/></Types>`);
            }
          }
          zip.file('[Content_Types].xml', ctXml);
        }
      } catch(e) { console.warn('[Word Export] Could not patch content types:', e.message); }
    }

    // ── STEP 4: Clean up any remaining unfilled placeholders ─────────────
    // Only match placeholders that are NOT inside XML tags (safe cleanup)
    xmlText = xmlText.replace(/\{[^\s{}]+\}/g, '');
    zip.file('word/document.xml', xmlText);

    // ── STEP 5: Process headers and footers ───────────────────────────────
    const headerFooterFiles = Object.keys(zip.files).filter(f =>
      /word\/(header|footer)\d*\.xml/i.test(f)
    );
    for (let _hi = 0; _hi < headerFooterFiles.length; _hi++) {
      const hfFile = headerFooterFiles[_hi];
      let hfXml = await zip.file(hfFile).async('text');
      hfXml = _fixDocxRunSplit(hfXml);
      for (let _pi = 0; _pi < repEntries.length; _pi++) {
        hfXml = hfXml.split(repEntries[_pi][0]).join(escXml(repEntries[_pi][1]));
      }
      hfXml = hfXml.replace(/\{[^\s{}]+\}/g, '');
      zip.file(hfFile, hfXml);
    }

    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    return { blob, filename: templateFile.name };
  } catch(e) {
    console.error('Export word error:', e);
    return 'Lỗi xuất Word: ' + e.message;
  }
};


// ==================== PLACEHOLDER TOOL (Client-side) ====================
const processPlaceholderTool = async (file, oldNum, newNum) => {
  if (!file) return 'Chưa chọn file';
  try {
    const ab = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);
    const oldPfx = `{doituong${oldNum}_`;
    const newPfx = `{doituong${newNum}_`;
    let count = 0;

    const processXml = (xml) => {
      const newXml = xml.split(oldPfx).join(newPfx);
      count += (xml.split(oldPfx).length - 1);
      return newXml;
    };

    const toProcess = Object.keys(zip.files).filter(f => 
      /word\/(document|header\d*|footer\d*)\.xml$/i.test(f)
    );
    for (let _ti = 0; _ti < toProcess.length; _ti++) {
      const xml = await zip.file(toProcess[_ti]).async('text');
      zip.file(toProcess[_ti], processXml(xml));
    }

    if (count === 0) return 'Không tìm thấy placeholder ' + oldPfx + ' trong file';
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    const base = file.name.replace(/\.docx$/i, '');
    return { blob, filename: `${base}_dt${newNum}.docx`, count };
  } catch(e) {
    return 'Lỗi: ' + e.message;
  }
};

      destroy(name) {
        if (this.instances[name]) {

          delete this.instances[name];
        }
      },
      
      destroyAll() {

    // ==================== FpDateInput: universal dd/mm/yyyy input ====================
    const FpDateInput = ({ name, value, onChange, className, placeholder, readOnly, style }) => {
      const ref = useRef(null);
      const fpRef = useRef(null);
      const latestOnChange = useRef(onChange);
      latestOnChange.current = onChange;
      
      useEffect(() => {
        if (!ref.current || readOnly) return;
        const display = value ? (value.includes('/') ? value : DateUtils.formatToVietnamese(value)) : null;
        fpRef.current = flatpickr(ref.current, {
          dateFormat: 'd/m/Y',
          defaultDate: display || undefined,
          allowInput: true,
          onChange: ([date]) => {
            if (date) {
              const d = `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
              latestOnChange.current({ target: { name, value: DateUtils.parseFromVietnamese(d) } });
            }
          }
        });
        return () => { if (fpRef.current) { fpRef.current.destroy(); fpRef.current = null; } };
      }, []);
      
      useEffect(() => {
        if (!fpRef.current || !value) return;
        const display = value.includes('/') ? value : DateUtils.formatToVietnamese(value);
        if (display) fpRef.current.setDate(display, false);
      }, [value]);
      
      const displayVal = value ? (value.includes('/') ? value : DateUtils.formatToVietnamese(value)) : '';
      if (readOnly) return <input type="text" className={className} style={style} value={displayVal} readOnly placeholder={placeholder||'dd/mm/yyyy'} />;
      return <input ref={ref} type="text" className={className} style={style} placeholder={placeholder||'dd/mm/yyyy'} />;
    };

    // ==================== TAG FILTER INPUT COMPONENT ====================
    // Hỗ trợ chọn nhiều tội danh, hiển thị dạng chip/tag
    const TagFilterInput = ({ tags, onAdd, onRemove, onClear, datalistId, dataSource, placeholder, accentColor }) => {
      const [inputVal, setInputVal] = React.useState('');
      const inputRef = React.useRef(null);
      const accent = accentColor || '#1d4ed8';

      const addTag = React.useCallback((val) => {
        const v = (val || inputVal).trim();
        if (!v) return;
        // Hỗ trợ nhập nhiều cách: dấu phẩy, Enter
        const parts = v.split(/[,،，]+/).map(s => s.trim()).filter(Boolean);
        parts.forEach(p => { if (!tags.includes(p)) onAdd(p); });
        setInputVal('');
      }, [inputVal, tags, onAdd]);

      const handleKey = React.useCallback((e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          addTag();
        } else if (e.key === 'Backspace' && !inputVal && tags.length > 0) {
          onRemove(tags[tags.length - 1]);
        }
      }, [inputVal, tags, addTag, onRemove]);

      const handleChange = React.useCallback((e) => {
        const v = e.target.value;
        // Nếu gõ dấu phẩy → tự thêm tag
        if (v.endsWith(',')) {
          addTag(v.slice(0, -1));
        } else {
          setInputVal(v);
        }
      }, [addTag]);

      const handleBlur = React.useCallback(() => {
        if (inputVal.trim()) addTag();
      }, [inputVal, addTag]);

      return (
        <div style={{border:'1.5px solid #e2e8f0',borderRadius:'7px',background:'#fff',padding:'4px 6px',cursor:'text',minHeight:'36px',display:'flex',flexWrap:'wrap',gap:'4px',alignItems:'center',transition:'border-color 0.2s',boxSizing:'border-box'}}

          {tags.map((tag, i) => (
            <span key={i} style={{display:'inline-flex',alignItems:'center',gap:'4px',background: accent+'18',color:accent,borderRadius:'5px',padding:'2px 8px',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap',border:'1px solid '+accent+'33'}}>
              {tag}
              <button onClick={(e)=>{e.stopPropagation();onRemove(tag);}} style={{background:'none',border:'none',cursor:'pointer',color:accent,fontSize:'13px',lineHeight:1,padding:'0',fontWeight:700,opacity:0.7}}>×</button>
            </span>
          ))}
          <input
            ref={inputRef}
            type="text"
            list={datalistId}
            value={inputVal}
            onChange={handleChange}
            onKeyDown={handleKey}
            onBlur={handleBlur}
            placeholder={tags.length === 0 ? (placeholder || 'Nhập tội danh, Enter hoặc dấu phẩy để thêm...') : '+ Thêm...'}
            style={{border:'none',outline:'none',fontSize:'12px',flex:'1 1 120px',minWidth:'80px',padding:'2px 2px',background:'transparent',color:'#1e293b'}}
          />
          <datalist id={datalistId}>
            {(dataSource||[]).map((t,i) => <option key={i} value={t}/>)}
          </datalist>
          {tags.length > 0 && (
            <button onClick={(e)=>{e.stopPropagation();onClear();setInputVal('');}} title="Xoá tất cả" style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:'13px',lineHeight:1,padding:'2px 4px',marginLeft:'auto'}}>✕ Xoá</button>
          )}
        </div>
      );
    };

    };

    // ==================== WORD IMPORT HELPER (Client-side) ====================
    // parseWordDocClientSide, parseVietnameseBioText, fmtDateVN, fmtDateShort,
    // exportWordTemplate, processPlaceholderTool
    // -> Defined in native <script> block above (Babel cannot compile async/await)

    // ==================== STATISTICS VIEW ====================
    const StatisticsView = ({ cases }) => {
      const [statConfig, setStatConfig] = React.useState({
        loaiXuat: 'both', trangThai: 'all', tuNgay: '', denNgay: '', phuong: '', khuPhoRange: '',
        loaiVuViec: '', // [NEW] lọc theo loại vụ việc (type[])
      });
      const [statsResult, setStatsResult] = React.useState(null);
      const [calculating, setCalculating] = React.useState(false);
      const [exporting, setExporting] = React.useState('');
      const tuNgayRef = React.useRef(null);
      const denNgayRef = React.useRef(null);

      React.useEffect(() => {
        let fp1, fp2;
        if (tuNgayRef.current) fp1 = flatpickr(tuNgayRef.current, { dateFormat: 'd/m/Y', onChange: ([d]) => { if(d) setStatConfig(c=>({...c,tuNgay:d.toISOString().slice(0,10)})); } });
        if (denNgayRef.current) fp2 = flatpickr(denNgayRef.current, { dateFormat: 'd/m/Y', onChange: ([d]) => { if(d) setStatConfig(c=>({...c,denNgay:d.toISOString().slice(0,10)})); } });
        return () => { fp1&&fp1.destroy(); fp2&&fp2.destroy(); };
      }, []);

      const parseKhuPhoRange = (s) => {
        if (!s||!s.trim()) return null;
        const set = new Set();
        s.split(',').forEach(p => { p=p.trim(); const r=p.match(/^(\d+)\s*-\s*(\d+)$/); if(r){for(let i=parseInt(r[1]);i<=parseInt(r[2]);i++)set.add(i);}else{const n=parseInt(p);if(!isNaN(n))set.add(n);} });
        return set;
      };
      const extractKhuPho = (addr) => { if(!addr) return null; const m=addr.match(/khu\s*ph[oố]\s*(\d+)/i); return m?parseInt(m[1]):null; };
      const isDrugRelated = (typeArr) => { const kw=['ma túy','ma tuy','điều 247','điều 248','điều 249','điều 250','điều 251','điều 252','điều 253','điều 254','điều 255','điều 256','điều 257','điều 258','điều 259','điều 194','điều 197','điều 198','heroin','methamphetamine','cần sa','thuốc lắc','tàng trữ','mua bán trái phép','sử dụng trái phép']; const s=(typeArr||[]).join(' ').toLowerCase(); return kw.some(k=>s.includes(k)); };
      const getCrimeCategory = (c) => { const t=Array.isArray(c.type)?c.type:[]; if(isDrugRelated(t)) return 'Ma túy'; if(t.length===0) return 'Chưa phân loại'; return t.join(', '); };
      const computeAge = (bd) => {
        if(!bd) return null;
        let yr,mo,dy;
        const iso=bd.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(iso){yr=parseInt(iso[1]);mo=parseInt(iso[2]);dy=parseInt(iso[3]);}
        else{const vn=bd.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(vn){dy=parseInt(vn[1]);mo=parseInt(vn[2]);yr=parseInt(vn[3]);}else{const y=bd.match(/(\d{4})/);if(!y)return null;return new Date().getFullYear()-parseInt(y[1]);}}
        const now=new Date(); let age=now.getFullYear()-yr; if(now.getMonth()+1<mo||(now.getMonth()+1===mo&&now.getDate()<dy))age--; return(age>=0&&age<120)?age:null;
      };

      const computeStats = () => {
        setCalculating(true);
        setTimeout(() => {
          const kpSet=parseKhuPhoRange(statConfig.khuPhoRange);
          const phuong=(statConfig.phuong||'').trim().toLowerCase();
          let filtered=cases.slice();
          if(statConfig.tuNgay) filtered=filtered.filter(c=>c.dateReceived>=statConfig.tuNgay);
          if(statConfig.denNgay) filtered=filtered.filter(c=>c.dateReceived<=statConfig.denNgay);
          if(statConfig.loaiXuat==='tinbao') filtered=filtered.filter(c=>(c.phanLoaiTin||'').toLowerCase()==='tin báo'||(c.investigationResult||'').toLowerCase()==='tin báo');
          else if(statConfig.loaiXuat==='vuviec') filtered=filtered.filter(c=>(c.phanLoaiTin||'').toLowerCase()!=='tin báo'&&(c.investigationResult||'').toLowerCase()!=='tin báo');
          if(statConfig.trangThai==='dangxuly') filtered=filtered.filter(c=>c.status!=='hoàn thành');
          else if(statConfig.trangThai==='hoanthanh') filtered=filtered.filter(c=>c.status==='hoàn thành');
          // [NEW] Lọc theo loại vụ việc trong Thống kê — array tags OR
          if(statConfig.loaiVuViec && statConfig.loaiVuViec.length > 0) {
            filtered = filtered.filter(c => statConfig.loaiVuViec.some(tag => {
              const lv = tag.toLowerCase().trim();
              return Array.isArray(c.type) ? c.type.some(t => t.toLowerCase().includes(lv)) : (c.type||'').toLowerCase().includes(lv);
            }));
          }

          const crimeGroups={};
          filtered.forEach(c=>{const cat=getCrimeCategory(c);if(!crimeGroups[cat])crimeGroups[cat]=[];crimeGroups[cat].push(c);});

          const groupStats={};
          Object.entries(crimeGroups).forEach(([cat,caseList])=>{
            const totalCases=caseList.length;
            const khoiToCount=caseList.filter(c=>(c.investigationResult||'').toLowerCase().includes('khởi tố')).length;
            const chuyenCount=caseList.filter(c=>(c.investigationResult||'').toLowerCase().includes('chuyển hồ sơ')).length;
            const solved=totalCases>0?Math.round((khoiToCount/totalCases)*100):0;
            const allObjs=caseList.flatMap(c=>(c.objects||[]).map(o=>({...o,_caseId:c.id})));
            const kpCount={};
            let diaBanCount=0;
            allObjs.forEach(obj=>{
              const addr=obj.currentResidence||obj.permanentAddress||'';
              const kp=extractKhuPho(addr);
              const phuongOk=phuong?addr.toLowerCase().includes(phuong):true;
              const kpOk=kpSet?(kp!==null&&kpSet.has(kp)):(kp!==null);
              if(phuongOk&&kpOk){const key='Khu phố '+kp;kpCount[key]=(kpCount[key]||0)+1;diaBanCount++;}
              else{kpCount['Địa bàn khác']=(kpCount['Địa bàn khác']||0)+1;}
            });
            const genderCount={};
            allObjs.forEach(o=>{const g=o.gender||'Chưa rõ';genderCount[g]=(genderCount[g]||0)+1;});
            const eduCount={};
            allObjs.forEach(o=>{const e=o.education||'Chưa rõ';eduCount[e]=(eduCount[e]||0)+1;});
            const ageCount={};
            allObjs.forEach(o=>{const age=computeAge(o.birthDate||'');const key=age!==null?String(age)+' tuổi':'Chưa rõ';ageCount[key]=(ageCount[key]||0)+1;});
            const locCount={};
            caseList.forEach(c=>{const kp=extractKhuPho(c.noixayra||'');const key=kp!==null?'Khu phố '+kp:(c.noixayra&&c.noixayra.trim()?c.noixayra.trim().substring(0,50):'Chưa rõ');locCount[key]=(locCount[key]||0)+1;});
            groupStats[cat]={totalCases,khoiToCount,chuyenCount,solved,totalObjs:allObjs.length,diaBanCount,diaBanKhac:kpCount['Địa bàn khác']||0,kpCount,genderCount,eduCount,ageCount,locCount,caseList};
          });

          const overallTotalCases=filtered.length;
          const overallTotalObjs=filtered.flatMap(c=>c.objects||[]).length;
          const overallKhoiTo=filtered.filter(c=>(c.investigationResult||'').toLowerCase().includes('khởi tố')).length;
          const overallChuyen=filtered.filter(c=>(c.investigationResult||'').toLowerCase().includes('chuyển hồ sơ')).length;
          const overallSolved=overallTotalCases>0?Math.round((overallKhoiTo/overallTotalCases)*100):0;
          setStatsResult({groupStats,overallTotalCases,overallTotalObjs,overallKhoiTo,overallChuyen,overallSolved,kpTotal:kpSet?kpSet.size:null,phuong,filteredCases:filtered,statConfig:{...statConfig}});
          setCalculating(false);
        },80);
      };

      const exportExcel = () => {
        if(!statsResult) return;
        setExporting('excel');
        try {
          const {groupStats,filteredCases,overallTotalCases,overallTotalObjs,overallKhoiTo,overallChuyen,overallSolved,phuong:ph,statConfig:sc}=statsResult;
          const wb=XLSX.utils.book_new();

          const loaiVVLabel=(sc.loaiVuViec&&sc.loaiVuViec.length>0) ? (' | Loại VV: '+(Array.isArray(sc.loaiVuViec)?sc.loaiVuViec.join(', '):sc.loaiVuViec)) : '';
          const dateStr=(DateUtils.formatToVietnamese(sc.tuNgay)||'--')+' đến '+(DateUtils.formatToVietnamese(sc.denNgay)||'--');
          const mainTitle='THỐNG KÊ VỤ VIỆC'+(ph?' — PHƯỜNG '+ph.toUpperCase():'');
          const today=new Date().toLocaleDateString('vi-VN');

          const GROUP_PAL=[

            {h:'BE123C',hl:'FFE4E6',rA:'FFF1F2',rB:'FFFAFC',ac:'FDA4AF'},
            {h:'0E7490',hl:'CFFAFE',rA:'ECFEFF',rB:'F5FEFF',ac:'67E8F9'},
            {h:'7E22CE',hl:'F3E8FF',rA:'FAF5FF',rB:'FEFCFF',ac:'D8B4FE'},
            {h:'9D174D',hl:'FCE7F3',rA:'FFF0F8',rB:'FFFAFD',ac:'F9A8D4'},

          sc1(r1,0,'📅 Thời gian: '+dateStr,metaS);sc1(r1,1,'',metaS);sc1(r1,2,'',metaS);
          mg1.push({s:{r:r1,c:0},e:{r:r1,c:2}});

          mg1.push({s:{r:r1,c:5},e:{r:r1,c:6}});

          // ── KPI Cards (label row then value row) ──
          const kpis=[
            {l:'TỔNG VỤ VIỆC',v:overallTotalCases,bg:'DBEAFE',fc:'1D4ED8',lbg:'EFF6FF'},
            {l:'TỔNG ĐỐI TƯỢNG',v:overallTotalObjs,bg:'DCFCE7',fc:'166534',lbg:'F0FDF4'},

            {l:'TỶ LỆ KHÁM PHÁ',v:overallSolved+'%',bg:'EDE9FE',fc:'5B21B6',lbg:'F5F3FF'},
          ];
          kpis.forEach((k,i)=>{
            sc1(r1,i*2,k.l,S({bold:true,sz:8,fc:'475569',bg:k.lbg,al:'center',bc:'E2E8F0'}));
            sc1(r1,i*2+1,'',S({bg:k.lbg,bc:'E2E8F0'}));
            mg1.push({s:{r:r1,c:i*2},e:{r:r1,c:i*2+1}});
          });
          r1++;
          kpis.forEach((k,i)=>{
            sc1(r1,i*2,k.v,S({bold:true,sz:20,fc:k.fc,bg:k.bg,al:'center',va:'center',bc:'E2E8F0'}));
            sc1(r1,i*2+1,'',S({bg:k.bg,bc:'E2E8F0'}));
            mg1.push({s:{r:r1,c:i*2},e:{r:r1,c:i*2+1}});
          });
          r1++;r1++;

          // ── Crime group summary table ──
          sc1(r1,0,'📊 PHÂN LOẠI THEO NHÓM TỘI DANH',S({bold:true,sz:11,fc:'FFFFFF',bg:'374151',al:'left',bc:'374151'}));
          for(let c=1;c<=9;c++) sc1(r1,c,'',S({bg:'374151',bc:'374151'}));
          mg1.push({s:{r:r1,c:0},e:{r:r1,c:9}});
          r1++;

          const gHdrs=['Nhóm tội danh','Số vụ','Đã khởi tố','Chuyển HS','Tỷ lệ KP','Tổng ĐT','Cư trú địa bàn','ĐB khác','Tổng KP+Chuyển'];
          gHdrs.forEach((h,i)=>sc1(r1,i,h,S({bold:true,sz:9,fc:'FFFFFF',bg:'1E40AF',al:'center',bc:'FFFFFF'})));

          sortedGroups.forEach(([cat,gs],idx)=>{

              tnr('Khu phố xảy ra nhiều nhất: '+(topIncKp[0]?topIncKp[0][0]+' ('+topIncKp[0][1]+' vụ)':'—')+'. Khu phố có nhiều đối tượng nhất: '+(topObjKp[0]?topObjKp[0][0]+' ('+topObjKp[0][1]+' đối tượng)':'—')+'.',{size:22,italic:true})
            ],AlignmentType.LEFT,60),
          ].filter(Boolean);

          const doc=new Document({sections:[{properties:{page:{margin:{top:720,bottom:720,left:1080,right:720}}},children}]});
          const blob=await Packer.toBlob(doc);
          saveAs(blob,'bao_cao_thong_ke_'+new Date().toISOString().slice(0,10)+'.docx');
        } catch(e){ console.error('Lỗi xuất Word:', e); }
        setExporting('');
      };

      // ── Design Components ──────────────────────────────────────────────

      // Donut ring chart (SVG, pure CSS-in-JS)
      const DonutChart = ({ data, size=80 }) => {
        const entries = Object.entries(data).filter(([,v])=>v>0);
        const total = entries.reduce((s,[,v])=>s+v,0);
        if(total===0) return null;
        const pal = ['#3b82f6','#ec4899','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ef4444'];
        const r=30; const cx=size/2; const cy=size/2; const circ=2*Math.PI*r;
        let offset=0;
        const slices = entries.map(([label,val],i)=>{
          const pct=val/total; const len=pct*circ; const s={offset,len,color:pal[i%pal.length],label,val,pct};
          offset+=len; return s;
        });
        return (
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <svg width={size} height={size} style={{flexShrink:0}}>
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth="10"/>
              {slices.map((s,i)=>(
                <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="10"
                  strokeDasharray={`${s.len} ${circ-s.len}`}
                  strokeDashoffset={circ/4-s.offset}
                  style={{transition:'stroke-dasharray 0.4s'}}/>
              ))}
              <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="13" fontWeight="800" fill="#1e293b">{total}</text>
            </svg>
            <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
              {slices.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px'}}>
                  <div style={{width:'8px',height:'8px',borderRadius:'50%',background:s.color,flexShrink:0}}/>
                  <span style={{color:'#374151',fontWeight:500}}>{s.label}</span>
                  <span style={{fontWeight:700,color:s.color}}>{s.val}</span>
                  <span style={{color:'#94a3b8',fontSize:'10px'}}>({Math.round(s.pct*100)}%)</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // Compact table with left-accent color strip
      const StatTable = ({ data, sortByCount=true, maxRows=10 }) => {
        if(!data||Object.keys(data).length===0) return <span style={{color:'#94a3b8',fontSize:'11px'}}>Không có dữ liệu</span>;
        const total = Object.values(data).reduce((s,v)=>s+v,0);
        let entries = Object.entries(data);
        if(sortByCount) entries.sort((a,b)=>b[1]-a[1]);
        if(entries.length>maxRows) entries=entries.slice(0,maxRows);
        const maxVal = Math.max(...entries.map(([,v])=>v));
        const pal=['#3b82f6','#06b6d4','#10b981','#8b5cf6','#f59e0b','#ef4444','#ec4899','#0f766e','#b45309','#1e40af'];
        return (
          <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
            {entries.map(([k,v],i)=>{
              const pct=total>0?Math.round(v/total*100):0;
              const barW=maxVal>0?Math.round(v/maxVal*100):0;
              const color=pal[i%pal.length];
              return (
                <div key={k} style={{display:'grid',gridTemplateColumns:'1fr auto',alignItems:'center',gap:'6px',padding:'3px 6px',borderRadius:'5px',background:i%2===0?'#f8fafc':'white',border:'1px solid #f1f5f9'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'6px',minWidth:0}}>
                    <div style={{width:'3px',height:'16px',borderRadius:'2px',background:color,flexShrink:0}}/>
                    <span style={{fontSize:'11px',color:'#374151',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={k}>{k}</span>
                    <div style={{flex:1,height:'4px',background:'#e2e8f0',borderRadius:'2px',overflow:'hidden',minWidth:'20px'}}>
                      <div style={{width:barW+'%',height:'100%',background:color,borderRadius:'2px'}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                    <span style={{fontWeight:700,fontSize:'12px',color:color}}>{v}</span>
                    <span style={{fontSize:'10px',color:'#94a3b8',minWidth:'26px'}}>({pct}%)</span>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      // Age grid: badge per unique age value
      const AgeGrid = ({ data }) => {
        if(!data||Object.keys(data).length===0) return <span style={{color:'#94a3b8',fontSize:'11px'}}>Không có dữ liệu</span>;
        const total = Object.values(data).reduce((s,v)=>s+v,0);
        const entries = Object.entries(data).sort((a,b)=>{
          const na=parseInt(a[0]); const nb=parseInt(b[0]);
          return isNaN(na)?1:isNaN(nb)?-1:na-nb;
        });
        const maxVal = Math.max(...entries.map(([,v])=>v));
        return (
          <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
            {entries.map(([k,v])=>{
              const intensity = maxVal>0?v/maxVal:0;
              // High intensity = dark blue bg + white text; low = light bg + dark text
              const isDark = intensity > 0.45;
              const bg = isDark
                ? `rgba(30,58,138,${0.75+intensity*0.25})`
                : `rgba(219,234,254,${0.5+intensity*0.8})`;
              const numColor = isDark ? '#ffffff' : '#1e3a8a';
              const lblColor = isDark ? 'rgba(255,255,255,0.85)' : '#1d4ed8';
              const pctColor = isDark ? 'rgba(255,255,255,0.6)' : '#3b82f6';
              const borderColor = isDark ? 'rgba(30,58,138,0.9)' : 'rgba(59,130,246,'+(0.3+intensity*0.4)+')';
              return (
                <div key={k} style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'4px 8px',borderRadius:'6px',background:bg,border:'1px solid '+borderColor,minWidth:'44px'}}>
                  <span style={{fontWeight:900,fontSize:'16px',color:numColor,lineHeight:1,textShadow:isDark?'0 1px 2px rgba(0,0,0,0.3)':'none'}}>{v}</span>
                  <span style={{fontSize:'9px',color:lblColor,fontWeight:700,marginTop:'1px'}}>{k}</span>
                  <span style={{fontSize:'9px',color:pctColor,fontWeight:500}}>{Math.round(v/total*100)}%</span>
                </div>
              );
            })}
          </div>
        );
      };

      // Pill group for categorical (location, etc.)
      const PillGroup = ({ data, colors }) => {
        if(!data||Object.keys(data).length===0) return <span style={{color:'#94a3b8',fontSize:'11px'}}>Không có dữ liệu</span>;
        const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);
        const total=entries.reduce((s,[,v])=>s+v,0);
        const pal=colors||['#7c3aed','#0891b2','#059669','#d97706','#dc2626','#be185d','#1e40af'];
        return (
          <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
            {entries.map(([k,v],i)=>(
              <div key={k} style={{display:'inline-flex',alignItems:'center',gap:'4px',padding:'3px 9px',borderRadius:'99px',background:pal[i%pal.length]+'15',border:'1.5px solid '+pal[i%pal.length]+'40',fontSize:'11px',fontWeight:600,color:pal[i%pal.length]}}>
                {k}: <b style={{fontSize:'12px'}}>{v}</b>
                <span style={{opacity:0.65,fontWeight:400,fontSize:'10px'}}>({Math.round(v/total*100)}%)</span>
              </div>
            ))}
          </div>
        );
      };

      const SolvedBar = ({ solved }) => (
        <div className="flex items-center gap-2">
          <div style={{flex:1,background:'#e2e8f0',borderRadius:'99px',height:'7px',overflow:'hidden'}}>
            <div style={{width:solved+'%',height:'100%',background:solved>=70?'#059669':solved>=40?'#d97706':'#dc2626',borderRadius:'99px'}}/>
          </div>
          <span style={{fontWeight:700,fontSize:'12px',color:solved>=70?'#059669':solved>=40?'#d97706':'#dc2626',minWidth:'34px'}}>{solved}%</span>
        </div>
      );

      return (
        <div>
          {/* ── Page Header ── */}
          <div className="page-header" style={{marginBottom:'14px'}}>
            <div className="page-title" style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'32px',height:'32px',background:'linear-gradient(135deg,#2563eb,#1d4ed8)',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
              </div>
              Thống Kê Chi Tiết Vụ Việc
            </div>
            {statsResult && (
              <div style={{display:'flex',gap:'8px'}}>
                <button className="tk-export-btn-excel" onClick={exportExcel} disabled={!!exporting}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  {exporting==='excel'?'⏳ Đang xuất...':'Xuất Excel'}
                </button>
                <button className="tk-export-btn-word" onClick={exportWord} disabled={!!exporting}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  {exporting==='word'?'⏳ Đang xuất...':'Xuất Word'}
                </button>
              </div>
            )}
          </div>

          {/* ── Config Panel ── */}
          <div className="tk-config-panel">
            <div className="tk-config-header">
              <div className="tk-config-header-left">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                Cấu hình thống kê
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div className="tk-config-body">
              <div className="tk-form-grid">
                <div className="tk-form-group">
                  <label className="tk-form-label">Loại xuất</label>
                  <select className="form-control" value={statConfig.loaiXuat} onChange={e=>setStatConfig(c=>({...c,loaiXuat:e.target.value}))}>
                    <option value="both">Tất cả (Tin báo + Vụ việc/Án)</option>
                    <option value="tinbao">Chỉ Tin báo</option>
                    <option value="vuviec">Chỉ Vụ việc / Vụ án</option>
                  </select>
                </div>
                <div className="tk-form-group">
                  <label className="tk-form-label">Trạng thái</label>
                  <select className="form-control" value={statConfig.trangThai} onChange={e=>setStatConfig(c=>({...c,trangThai:e.target.value}))}>
                    <option value="all">Tất cả</option>
                    <option value="dangxuly">Đang xử lý</option>
                    <option value="hoanthanh">Đã hoàn thành</option>
                  </select>
                </div>
                <div className="tk-form-group">
                  <label className="tk-form-label">Từ ngày</label>
                  <input type="text" ref={tuNgayRef} placeholder="dd/mm/yyyy" className="form-control" readOnly style={{cursor:'pointer'}}/>
                </div>
                <div className="tk-form-group">
                  <label className="tk-form-label">Đến ngày</label>
                  <input type="text" ref={denNgayRef} placeholder="dd/mm/yyyy" className="form-control" readOnly style={{cursor:'pointer'}}/>
                </div>
                <div className="tk-form-group">
                  <label className="tk-form-label">Phường thống kê</label>
                  <input type="text" className="form-control" placeholder="VD: Tân Bình" value={statConfig.phuong} onChange={e=>setStatConfig(c=>({...c,phuong:e.target.value}))}/>
                </div>
                <div className="tk-form-group">
                  <label className="tk-form-label">Khu phố (phạm vi)</label>
                  <input type="text" className="form-control" placeholder="VD: 1-39 hoặc 1-12, 14-20" value={statConfig.khuPhoRange} onChange={e=>setStatConfig(c=>({...c,khuPhoRange:e.target.value}))}/>
                  {statConfig.khuPhoRange&&(()=>{const s=parseKhuPhoRange(statConfig.khuPhoRange);return(<div style={{fontSize:'11px',color:s?'#059669':'#dc2626',marginTop:'2px'}}>{s?'✓ Tổng: '+s.size+' khu phố':'⚠️ Định dạng không hợp lệ'}</div>);})()}
                </div>
                {/* [NEW] Lọc theo loại vụ việc trong Thống kê — nhiều tội danh */}
                <div className="tk-form-group" style={{gridColumn:'1/-1'}}>
                  <label className="tk-form-label">🗂 Lọc theo loại vụ việc</label>
                  <TagFilterInput
                    tags={Array.isArray(statConfig.loaiVuViec) ? statConfig.loaiVuViec : (statConfig.loaiVuViec ? [statConfig.loaiVuViec] : [])}
                    onAdd={(tag) => setStatConfig(c=>({...c, loaiVuViec: [...(Array.isArray(c.loaiVuViec)?c.loaiVuViec:(c.loaiVuViec?[c.loaiVuViec]:[])), tag].filter((v,i,a)=>a.indexOf(v)===i)}))}
                    onRemove={(tag) => setStatConfig(c=>({...c, loaiVuViec: (Array.isArray(c.loaiVuViec)?c.loaiVuViec:[]).filter(t=>t!==tag)}))}
                    onClear={() => setStatConfig(c=>({...c, loaiVuViec: []}))}
                    datalistId="loaiVuViecStatList"
                    dataSource={[...new Set(cases.flatMap(c => Array.isArray(c.type) ? c.type : [c.type||'']).filter(Boolean))].sort()}
                    placeholder="Thêm tội danh... (Enter hoặc dấu phẩy để thêm)"
                    accentColor="#7c3aed"
                  />
                </div>
              </div>
              <div style={{display:'flex',gap:'8px',marginTop:'14px'}}>
                <button className="btn btn-primary" onClick={computeStats} disabled={calculating} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
                  {calculating?'⏳ Đang tính...':'Tạo thống kê'}
                </button>
                <button className="btn btn-gray" onClick={()=>{setStatsResult(null);setStatConfig({loaiXuat:'both',trangThai:'all',tuNgay:'',denNgay:'',phuong:'',khuPhoRange:'',loaiVuViec:[]});if(tuNgayRef.current)tuNgayRef.current.value='';if(denNgayRef.current)denNgayRef.current.value='';}} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                  Đặt lại
                </button>
              </div>
            </div>
          </div>

          {statsResult && (() => {
            const {groupStats,overallTotalCases,overallTotalObjs,overallKhoiTo,overallChuyen,overallSolved,kpTotal,phuong:ph}=statsResult;
            const catCount=Object.keys(groupStats).length;
            return (
              <div>
                {/* Summary KPI row */}
                <div className="tk-stat-grid">
                  <div className="tk-stat-card amber">
                    <div className="tk-stat-icon">📂</div>
                    <div><div className="tk-stat-value">{overallTotalCases}</div><div className="tk-stat-label">Tổng vụ việc</div></div>
                  </div>
                  <div className="tk-stat-card purple">
                    <div className="tk-stat-icon">👥</div>
                    <div><div className="tk-stat-value">{overallTotalObjs}</div><div className="tk-stat-label">Tổng đối tượng</div></div>
                  </div>
                  <div className="tk-stat-card orange">
                    <div className="tk-stat-icon">⚖️</div>
                    <div><div className="tk-stat-value">{overallKhoiTo}</div><div className="tk-stat-label">Đã khởi tố</div></div>
                  </div>
                  <div className="tk-stat-card teal">
                    <div className="tk-stat-icon">📤</div>
                    <div><div className="tk-stat-value">{overallChuyen}</div><div className="tk-stat-label">Chuyển hồ sơ</div></div>
                  </div>
                  <div className="tk-stat-card red">
                    <div className="tk-stat-icon">🎯</div>
                    <div><div className="tk-stat-value">{overallSolved}%</div><div className="tk-stat-label">Tỷ lệ khám phá</div></div>
                  </div>
                </div>

                {/* Overview distribution – only if multiple crime types */}
                {catCount>1&&(
                  <div className="card" className="mb-3">
                    <div className="card-header">📊 Phân bố theo loại vụ việc</div>
                    <div className="card-body" style={{padding:'12px 16px'}}>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:'8px'}}>
                        {Object.entries(groupStats).sort((a,b)=>b[1].totalCases-a[1].totalCases).map(([cat,gs],i)=>{
                          const pal=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4'];
                          const color=pal[i%pal.length];
                          const pct=overallTotalCases>0?Math.round(gs.totalCases/overallTotalCases*100):0;
                          return(
                            <div key={cat} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',background:color+'0d',border:'1.5px solid '+color+'30',borderRadius:'8px'}}>
                              <div style={{width:'36px',height:'36px',borderRadius:'50%',background:color+'20',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                <span style={{fontSize:'16px',fontWeight:800,color}}>{gs.totalCases}</span>
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:'11px',fontWeight:700,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={cat}>{cat}</div>
                                <div style={{fontSize:'10px',color:'#64748b'}}>{gs.totalObjs} đối tượng · {pct}%</div>
                                <div style={{height:'3px',background:'#e2e8f0',borderRadius:'2px',marginTop:'3px'}}>
                                  <div style={{width:pct+'%',height:'100%',background:color,borderRadius:'2px'}}/>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {/* Per crime type detail cards */}
                {Object.entries(groupStats).sort((a,b)=>b[1].totalCases-a[1].totalCases).map(([cat,gs])=>(
                  <div key={cat} className="card" className="mb-3">
                    <div className="card-header" style={{background:'linear-gradient(135deg,#1e3a8a,#1e40af)',color:'white'}}>
                      {cat==='Ma túy'?'💊':cat==='Chưa phân loại'?'❓':'⚖️'} {cat}
                      <span style={{marginLeft:'10px',background:'rgba(255,255,255,0.2)',padding:'2px 8px',borderRadius:'99px',fontSize:'11px'}}>{gs.totalCases} vụ · {gs.totalObjs} đối tượng</span>
                    </div>
                    <div className="card-body" style={{padding:'12px 14px'}}>

                      {/* Row 1: 5 KPI mini blocks */}

    // ==================== WORD EXPORT MODAL ====================
    const WordExportModal = ({ cases, onClose, addToast }) => {
      const [selectedCaseId, setSelectedCaseId] = React.useState('');
      const [selectedObjs, setSelectedObjs] = React.useState([]);
      const [exportPerObj, setExportPerObj] = React.useState(true); // xuất riêng từng đối tượng mặc định
      const [templateFile, setTemplateFile] = React.useState(null);
      const [templateName, setTemplateName] = React.useState('');
      const [templateFiles, setTemplateFiles] = React.useState([]); // multi-file list
      const [exporting, setExporting] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('export');
      // Folder selection state
      const [saveFolder, setSaveFolder] = React.useState(null);
      const [saveFolderName, setSaveFolderName] = React.useState('');
      const [folderSupported] = React.useState(() => typeof window !== 'undefined' && 'showDirectoryPicker' in window);

      // Chọn folder lưu file
      const handlePickFolder = async () => {
        try {
          const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
          setSaveFolder(dirHandle);
          setSaveFolderName(dirHandle.name);
          addToast('✅ Đã chọn folder: ' + dirHandle.name, 'success');
        } catch (e) {
          if (e.name !== 'AbortError') addToast('Không thể chọn folder: ' + e.message, 'error');
        }
      };

      // State hiển thị kết quả xuất file
      const [exportResult, setExportResult] = React.useState(null); // {folderName, files:[]}


      // Lưu blob vào folder hoặc fallback download
      const saveBlob = async (blob, filename) => {
        if (saveFolder) {
          try {
            const fileHandle = await saveFolder.getFileHandle(filename, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
            return true;
          } catch (e) {
            addToast('Lỗi lưu vào folder: ' + e.message + ' — thử download thông thường', 'warning');
          }
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 300);
        return false;
      };

      // ── GitHub Template Library ────────────────────────────────────────
      const GH_KEY = 'vv_github_repo';
      const [ghRepo, setGhRepo] = React.useState(() => localStorage.getItem(GH_KEY) || '');
      const [ghRepoInput, setGhRepoInput] = React.useState(() => localStorage.getItem(GH_KEY) || '');
      const [ghFiles, setGhFiles] = React.useState([]);
      const [ghLoading, setGhLoading] = React.useState(false);
      const [ghError, setGhError] = React.useState('');
      const [ghFolder, setGhFolder] = React.useState('');

      // Auto-connect GitHub when library tab is opened and repo is saved
      React.useEffect(() => {
        if (activeTab === 'library' && ghRepo && ghFiles.length === 0 && !ghLoading && !ghError) {
          loadGhFiles(ghRepo, ghFolder);
        }
      }, [activeTab]);

      // Parse GitHub repo URL → API URL
      const parseGhUrl = (url) => {
        // Accept: https://github.com/user/repo  or  user/repo
        const m = url.match(/github\.com\/([^/]+\/[^/\s]+)/);
        if (m) return `https://api.github.com/repos/${m[1].replace(/\.git$/,'')}/contents`;
        const m2 = url.match(/^([a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+)$/);
        if (m2) return `https://api.github.com/repos/${m2[1]}/contents`;
        return null;
      };

      const loadGhFiles = (repoUrl, folder) => {
        const base = parseGhUrl(repoUrl);
        if (!base) { setGhError('URL không hợp lệ. Ví dụ: username/ten-repo'); return; }
        setGhLoading(true); setGhError(''); setGhFiles([]);
        const path = folder ? ('/' + folder) : '';
        fetch(base + path, { headers: { Accept: 'application/vnd.github.v3+json' } })
          .then(resp => {
            if (!resp.ok) {
              setGhError('Lỗi ' + resp.status + ': ' + (resp.status === 404 ? 'Repo không tồn tại hoặc là private' : 'Không truy cập được'));
              setGhLoading(false);
              return null;
            }
            return resp.json();
          })
          .then(items => {
            if (items !== null && items !== undefined) {
              setGhFiles(Array.isArray(items) ? items : []);
            }
            setGhLoading(false);
          })
          .catch(e => { setGhError('Không kết nối được GitHub API: ' + e.message); setGhLoading(false); });
      };

      const saveGhRepo = () => {
        localStorage.setItem(GH_KEY, ghRepoInput.trim());
        setGhRepo(ghRepoInput.trim());
        setGhFolder('');
        loadGhFiles(ghRepoInput.trim(), '');
      };

      const downloadAndUse = (file) => {
        addToast('⏳ Đang tải "' + file.name + '"...', 'info');
        fetch(file.download_url)
          .then(resp => {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.blob();
          })
          .then(blob => {
            const f = new File([blob], file.name, { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            setTemplateFiles(prev => {
              if (prev.find(x => x.name === f.name)) return prev;
              return [...prev, f];
            });
            setTemplateFile(f);
            setTemplateName(file.name);
            setActiveTab('export');
            addToast('✅ Đã thêm mẫu "' + file.name + '" vào danh sách – chọn vụ việc rồi Xuất', 'success');
          })
          .catch(e => addToast('Lỗi tải file: ' + e.message, 'error'));
      };

      const docxFiles = ghFiles.filter(f => f.type === 'file' && f.name.endsWith('.docx'));
      const subFolders = ghFiles.filter(f => f.type === 'dir');

      // ── Virtual folder manager ────────────────────────────────────────
      const FOLDER_KEY = 'vv_folder_tree';
      const getFolderTree = () => {
        try { return JSON.parse(localStorage.getItem(FOLDER_KEY)) || { docx_templates:{_files:[]}, '1_doi_tuong':{_files:[]}, '2_bien_ban':{_files:[]} }; }
        catch { return { docx_templates:{_files:[]}, '1_doi_tuong':{_files:[]}, '2_bien_ban':{_files:[]} }; }
      };
      const [folderTree, setFolderTree] = React.useState(getFolderTree);
      const [newFolderName, setNewFolderName] = React.useState('');
      const [expandedFolders, setExpandedFolders] = React.useState({});
      const saveFolderTree = (tree) => { setFolderTree(tree); localStorage.setItem(FOLDER_KEY, JSON.stringify(tree)); };
      const addSubFolder = (parent) => {
        if (!newFolderName.trim()) { addToast('Nhập tên folder!','warning'); return; }
        const tree = {...folderTree};
        if (!tree[parent]) tree[parent] = {_files:[]};
        const safe = newFolderName.trim().replace(/[/\\:*?"<>|]/g,'_');
        if (tree[parent][safe]) { addToast('Folder đã tồn tại!','warning'); return; }
        tree[parent][safe] = {_files:[]};
        saveFolderTree(tree); setNewFolderName('');
        addToast('Đã tạo: ' + safe, 'success');
      };
      const deleteSubFolder = (parent, sub) => {
        if (!window.confirm(`Xóa folder "${sub}"?`)) return;
        const tree = {...folderTree}; delete tree[parent][sub]; saveFolderTree(tree);
      };

      // ── Export ────────────────────────────────────────────────────────
      const selectedCase = cases.find(c => c.id === selectedCaseId);
      const objects = selectedCase ? (selectedCase.objects || []) : [];
      const toggleObj = (i) => setSelectedObjs(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev,i]);

      const handleExport = () => {
        if (!selectedCase) { addToast('Vui lòng chọn vụ việc!','warning'); return; }
        if (selectedObjs.length === 0) { addToast('Vui lòng chọn ít nhất 1 đối tượng!','warning'); return; }
        const allTemplates = templateFiles.length > 0 ? templateFiles : (templateFile ? [templateFile] : []);
        if (allTemplates.length === 0) { addToast('Vui lòng chọn ít nhất 1 file Word mẫu (hoặc tải từ Thư viện)!','warning'); return; }
        setExporting(true);

        // Tạo danh sách công việc: mỗi cặp (template × đối tượng)
        // Nếu xuất riêng từng đối tượng → mỗi đối tượng × mỗi template = 1 file
        // Nếu không → tất cả đối tượng vào 1 file mỗi template (cú pháp cũ doituong1/2/3)
        const jobs = [];
        if (exportPerObj) {
          // Mỗi đối tượng được xuất riêng → placeholder đơn giản {ho_va_ten}
          selectedObjs.forEach(objIdx => {
            allTemplates.forEach(tpl => {
              jobs.push({ tpl, objIndices: [objIdx], label: (objects[objIdx] && objects[objIdx].name) || ('DT' + (objIdx+1)) });
            });
          });
        } else {
          // Tất cả đối tượng vào 1 file (cú pháp doituong1/2/3...)
          allTemplates.forEach(tpl => {
            const names = selectedObjs.map(i => (objects[i] && objects[i].name) || '').filter(Boolean).join(' & ');
            jobs.push({ tpl, objIndices: selectedObjs, label: names });
          });
        }

        const savedFiles = [];
        const exportNext = (idx) => {
          if (idx >= jobs.length) {
            setExporting(false);
            setExportResult({ folderName: saveFolder ? saveFolderName : null, files: savedFiles, total: jobs.length });
            return;
          }
          const { tpl, objIndices, label } = jobs[idx];
          exportWordTemplate(tpl, selectedCase, objects, objIndices, getUnitSettings())
            .then(async result => {
              if (typeof result === 'string') { addToast(result,'error'); exportNext(idx+1); return; }
              const baseName = result.filename.replace(/\.docx$/i, '');
              const filename = (baseName + ' - ' + label).replace(/[\\/:*?"<>|]/g, '_') + '.docx';
              const usedFolder = await saveBlob(result.blob, filename);
              savedFiles.push(filename);
              exportNext(idx+1);
            })
            .catch(err => {
              // [OPT-4] Phân loại lỗi cho người dùng biết hướng xử lý
              const msg = err.message || '';
              let userMsg = 'Lỗi xuất Word: ' + msg;
              if (msg.includes('Unclosed') || msg.includes('tag')) userMsg = '❌ Mẫu Word lỗi định dạng placeholder (tag chưa đóng). Kiểm tra file mẫu.';
              else if (msg.includes('corrupt') || msg.includes('unexpected')) userMsg = '❌ File mẫu bị hỏng hoặc không phải .docx hợp lệ.';
              else if (msg.includes('arrayBuffer') || msg.includes('read')) userMsg = '❌ Không đọc được file mẫu. Thử chọn lại file.';
              addToast(userMsg, 'error');
              exportNext(idx+1);
            });
        };
        exportNext(0);
      };

      const TABS = [
        ['export','📥 Xuất Word'],
        ['library','☁️ Thư viện GitHub'],
      ];

      return (
        <>
        <div className="modal-overlay">
          <div className="modal-box" style={{width:'660px',maxHeight:'92vh',overflowY:'auto'}}>
            <div className="modal-header" style={{background:'linear-gradient(135deg,#15803d,#166534)'}}>
              📄 Xuất File Word Mẫu
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            {/* Tab bar */}
            <div style={{display:'flex',borderBottom:'2px solid #e2e8f0',background:'#f8fafc',flexWrap:'wrap'}}>
              {TABS.map(([k,lbl])=>(
                <button key={k} onClick={()=>setActiveTab(k)} style={{padding:'10px 16px',background:activeTab===k?'#fff':'transparent',fontWeight:activeTab===k?700:400,borderBottom:activeTab===k?'2px solid #15803d':'2px solid transparent',color:activeTab===k?'#15803d':'#64748b',cursor:'pointer',border:'none',fontSize:'13px',marginBottom:'-2px'}}>
                  {lbl}
                </button>
              ))}
            </div>

            <div className="modal-body">
              {/* ── TAB: XUẤT WORD ── */}
              {activeTab === 'export' && (<>
                <div className="form-group">
                  <label className="form-label">1. Chọn vụ việc</label>
                  <select className="form-control" value={selectedCaseId} onChange={e=>{setSelectedCaseId(e.target.value);setSelectedObjs([]);}}>
                    <option value="">-- Chọn vụ việc --</option>
                    {cases.map(c=><option key={c.id} value={c.id}>{c.id} — {Array.isArray(c.type)?c.type[0]:c.type}</option>)}
                  </select>
                </div>
                {objects.length > 0 && (
                  <div className="form-group">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px',flexWrap:'wrap',gap:'8px'}}>
                      <label className="form-label" style={{margin:0}}>2. Chọn đối tượng</label>
                      {/* Toggle chế độ xuất */}
                      <div style={{display:'flex',alignItems:'center',gap:'6px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'4px 8px',fontSize:'12px'}}>
                        <span style={{color:'#64748b',fontWeight:500}}>Chế độ xuất:</span>
                        <button
                          onClick={()=>setExportPerObj(true)}
                          style={{padding:'3px 10px',borderRadius:'5px',border:'none',cursor:'pointer',fontWeight:700,fontSize:'11px',
                            background:exportPerObj?'#15803d':'transparent',color:exportPerObj?'#fff':'#64748b',transition:'all 0.15s'}}
                        >📄 Riêng từng người</button>
                        <button
                          onClick={()=>setExportPerObj(false)}
                          style={{padding:'3px 10px',borderRadius:'5px',border:'none',cursor:'pointer',fontWeight:700,fontSize:'11px',
                            background:!exportPerObj?'#1d4ed8':'transparent',color:!exportPerObj?'#fff':'#64748b',transition:'all 0.15s'}}
                        >📋 Gộp chung</button>
                      </div>
                    </div>

                    {/* Hướng dẫn placeholder theo chế độ */}
                    <div style={{marginBottom:'8px',padding:'8px 12px',borderRadius:'7px',fontSize:'11px',lineHeight:1.6,
                      background: exportPerObj?'#f0fdf4':'#eff6ff',
                      border: exportPerObj?'1px solid #86efac':'1px solid #bfdbfe',
                      color: exportPerObj?'#166534':'#1e40af'}}>
                      {exportPerObj ? (<>
                        <b>📄 Xuất riêng từng người</b> — Mỗi đối tượng được xuất thành 1 file Word riêng.<br/>
                        Dùng placeholder đơn giản trong template: <code style={{background:'rgba(0,0,0,0.08)',padding:'1px 5px',borderRadius:'3px'}}>{'{ho_va_ten}'}</code> <code style={{background:'rgba(0,0,0,0.08)',padding:'1px 5px',borderRadius:'3px'}}>{'{ngay_sinh}'}</code> <code style={{background:'rgba(0,0,0,0.08)',padding:'1px 5px',borderRadius:'3px'}}>{'{so_cmnd}'}</code> ...
                        <br/><span style={{opacity:0.8}}>⚡ Không cần tạo nhiều template cho nhiều đối tượng!</span>
                      </>) : (<>
                        <b>📋 Gộp chung</b> — Tất cả đối tượng vào 1 file, thứ tự chọn = số trong placeholder.<br/>
                        Dùng: <code style={{background:'rgba(0,0,0,0.08)',padding:'1px 5px',borderRadius:'3px'}}>{'{doituong1_ho_va_ten}'}</code> <code style={{background:'rgba(0,0,0,0.08)',padding:'1px 5px',borderRadius:'3px'}}>{'{doituong2_ho_va_ten}'}</code> ...
                      </>)}
                    </div>

                    <div style={{border:'1px solid #e2e8f0',borderRadius:'8px',overflow:'hidden'}}>
                      {/* Nút chọn tất cả / bỏ chọn */}
                      <div style={{display:'flex',gap:'6px',padding:'6px 10px',background:'#f8fafc',borderBottom:'1px solid #f1f5f9'}}>
                        <button onClick={()=>setSelectedObjs(objects.map((_,i)=>i))} className="btn btn-gray btn-xs" style={{fontSize:'11px',padding:'3px 10px'}}>✓ Tất cả</button>
                        <button onClick={()=>setSelectedObjs([])} className="btn btn-gray btn-xs" style={{fontSize:'11px',padding:'3px 10px'}}>✕ Bỏ hết</button>
                        {selectedObjs.length > 0 && <span style={{fontSize:'11px',color:'#64748b',alignSelf:'center',marginLeft:'4px'}}>
                          Đã chọn {selectedObjs.length}/{objects.length} · Sẽ tạo {exportPerObj ? selectedObjs.length * (templateFiles.length||1) : (templateFiles.length||1)} file
                        </span>}
                      </div>
                      {objects.map((obj,i)=>(
                        <div key={i} onClick={()=>toggleObj(i)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'9px 14px',cursor:'pointer',
                          background:selectedObjs.includes(i)?'#f0fdf4':'white',

                          <div style={{width:'26px',height:'26px',borderRadius:'50%',

                            fontWeight:800,fontSize:'12px',flexShrink:0}}>
                            {selectedObjs.includes(i)
                              ? (exportPerObj ? '✓' : (selectedObjs.indexOf(i)+1))
                              : (i+1)}

    // ==================== PLACEHOLDER TOOL MODAL ====================
    const PlaceholderToolModal = ({ onClose, addToast }) => {
      const [files, setFiles] = React.useState([]);

      const [newNum, setNewNum] = React.useState('2');
      const [processing, setProcessing] = React.useState(false);
      const [results, setResults] = React.useState([]);

      const handleRun = () => {
        if (files.length === 0) { addToast('Vui lòng chọn ít nhất 1 file Word!', 'warning'); return; }
        if (oldNum === newNum) { addToast('Số cũ và mới phải khác nhau!', 'warning'); return; }
        setProcessing(true); setResults([]);
        // Process files sequentially using promise chain
        const newResults = [];
        const processNext = (idx) => {
          if (idx >= files.length) {
            setProcessing(false);
            setResults(newResults);
            const okCount = newResults.filter(function(r){ return r.ok; }).length;
            if (okCount > 0) addToast('Đổi placeholder thành công ' + okCount + '/' + files.length + ' file!', 'success');
            return;
          }
          const file = files[idx];
          processPlaceholderTool(file, oldNum, newNum).then(function(res) {
            if (typeof res === 'string') {
              newResults.push({ ok: false, name: file.name, msg: res });
            } else {
              const url = URL.createObjectURL(res.blob);
              const a = document.createElement('a'); a.href = url; a.download = res.filename;
              document.body.appendChild(a); a.click();
              setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 300);
              newResults.push({ ok: true, name: file.name, msg: '✅ Thay ' + res.count + ' placeholder → ' + res.filename });
            }
            processNext(idx + 1);
          });
        };
        processNext(0);
      };

      return (
        <div className="modal-overlay">
          <div className="modal-box" style={{width:'560px', maxHeight:'90vh', overflowY:'auto'}}>

                </div>

      // Auto-parse "Hoàn cảnh gia đình" → Gia đình tab
      useEffect(() => {
        if (!objectData.familyBackground) return;
        const text = objectData.familyBackground;
        // Helper: get value after label with colon, stops at newline or semicolon
        const g = (label) => { const m = text.match(new RegExp(label + '\\s*[:\\-]\\s*([^\\n;]+)', 'i')); return m ? m[1].trim() : null; };
        // Split into lines for line-by-line parsing
        const lines = text.split(/\n/);
        
        // Extract year from text
        const getYear = (s) => { const m = s.match(/(19|20)\d{2}/); return m ? m[0] : null; };
        
        // Cha fields
        const chaTen = g('Họ và tên cha') || g('Họ tên cha') || g('Tên cha');
        // Sinh năm cha: support "Sinh năm (cha):", "Sinh năm cha:", "Năm sinh (cha):"
        // FIXED: Capture any text (not just \d{4}) so values like "không rõ", "mất", "1975" all work
        let chaSinhNam = null;
        { const m = text.match(/Sinh\s+n[aă]m\s*[\(（]?\s*cha\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i)
                    || text.match(/N[aă]m\s+sinh\s*[\(（]?\s*cha\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i); if (m && m[1].trim()) chaSinhNam = m[1].trim(); }
        if (!chaSinhNam) {
          // Try line-by-line: find line with "cha" then look for sinh năm on next/same line
          let inCha = false;
          for (const l of lines) {
            const ll = l.toLowerCase();
            if (/\bcha\s*[:\-]/.test(ll)) { inCha = true; }
            if (inCha && /sinh\s+n[aă]m/i.test(ll)) {
              // Extract value after label (any text), fall back to year-only if no explicit colon value
              const afterColon = l.match(/sinh\s+n[aă]m\s*[:\-]\s*([^\n;,]+)/i);
              if (afterColon && afterColon[1].trim()) { chaSinhNam = afterColon[1].trim(); break; }
              const y = getYear(ll); if (y) { chaSinhNam = y; break; }
            }
            if (inCha && /\bm[eẹ]\s*[:\-]/.test(ll)) break;
          }
        }
        const chaNghe = g('Nghề nghiệp \\(cha\\)') || g('Nghề nghiệp cha');
        const chaNoi = g('Nơi ở hiện tại \\(cha\\)') || g('Nơi ở hiện tại cha') || g('Nơi ở \\(cha\\)') || g('Nơi ở cha');
        
        // Mẹ fields
        const meTen = g('Họ và tên mẹ') || g('Họ tên mẹ') || g('Tên mẹ');
        // FIXED: Capture any text for meSinhNam too (same logic as cha above)
        let meSinhNam = null;
        { const m = text.match(/Sinh\s+n[aă]m\s*[\(（]?\s*m[eẹ]\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i)
                    || text.match(/N[aă]m\s+sinh\s*[\(（]?\s*m[eẹ]\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i); if (m && m[1].trim()) meSinhNam = m[1].trim(); }
        if (!meSinhNam) {
          let inMe = false;
          for (const l of lines) {
            const ll = l.toLowerCase();
            if (/\bm[eẹ]\s*[:\-]/.test(ll)) { inMe = true; }
            if (inMe && /sinh\s+n[aă]m/i.test(ll)) {
              const afterColon = l.match(/sinh\s+n[aă]m\s*[:\-]\s*([^\n;,]+)/i);
              if (afterColon && afterColon[1].trim()) { meSinhNam = afterColon[1].trim(); break; }
              const y = getYear(ll); if (y) { meSinhNam = y; break; }
            }
          }
        }
        const meNghe = g('Nghề nghiệp \\(mẹ\\)') || g('Nghề nghiệp mẹ');
        const meNoi = g('Nơi ở hiện tại \\(mẹ\\)') || g('Nơi ở hiện tại mẹ') || g('Nơi ở \\(mẹ\\)') || g('Nơi ở mẹ');
        
        const upd = {};
        if (chaTen) upd.chaTen = chaTen;
        if (chaSinhNam) upd.chaSinhNam = chaSinhNam;
        if (chaNghe) upd.chaNgheNghiep = chaNghe;
        if (chaNoi) upd.chaNoiO = chaNoi;
        if (meTen) upd.meTen = meTen;
        if (meSinhNam) upd.meSinhNam = meSinhNam;
        if (meNghe) upd.meNgheNghiep = meNghe;
        if (meNoi) upd.meNoiO = meNoi;
        if (Object.keys(upd).length) setObjectData(prev => ({...prev, ...upd}));

      // Auto-generate lyLichGon
      useEffect(() => {

        const permanentAddr = objectData.permanentAddress || "";
        const currentAddr = objectData.currentResidence || objectData.permanentAddress || "";
        if (name || year) {

      // Auto-calculate expiration dates

      // Auto-save draft when editing an existing object
      useEffect(() => {

      // FIXED: Handle input changes with proper state management
      // Hàm cập nhật trường có bảo mật: nếu trường đã có dữ liệu → yêu cầu mật khẩu
      const secureSetObjectField = useCallback((name, value) => {
        const label = SECURE_FIELDS[name];
        const current = objectData[name];
        if (label && current && String(current).trim()) {
          requestSecure(label, () => setObjectData(prev => ({ ...prev, [name]: value })));
        } else {
          setObjectData(prev => ({ ...prev, [name]: value }));
        }
      }, [objectData, requestSecure]);

      // Hàm xóa trường bảo mật có xác thực
      const secureClearObjectField = useCallback((fields) => {
        // fields: string hoặc array of string
        const arr = Array.isArray(fields) ? fields : [fields];
        const secureLabel = arr.map(f => SECURE_FIELDS[f]).filter(Boolean)[0];
        const hasData = arr.some(f => objectData[f] && String(objectData[f]).trim());
        const doIt = () => setObjectData(prev => {
          const upd = { ...prev };
          arr.forEach(f => { upd[f] = ''; });
          return upd;
        });
        if (secureLabel && hasData) {
          requestSecure(secureLabel + ' (xóa)', doIt);
        } else {
          doIt();
        }
      }, [objectData, requestSecure]);

      // [FIX-SECURE] Khi editingIndex thay đổi (mở đối tượng mới) → reset snapshot.
      const prevEditingIndexRef = useRef(undefined);
      useEffect(() => {
        if (prevEditingIndexRef.current !== editingIndex) {
          prevEditingIndexRef.current = editingIndex;
          const snap = {};
          Object.keys(SECURE_FIELDS).forEach(function(k) {
            if (objectData[k] && String(objectData[k]).trim()) snap[k] = objectData[k];
          });
          originalObjSecureValues.current = snap;
        }
      }, [editingIndex, objectData]);

      const handleObjectInputChange = useCallback((e) => {
        const { name, value } = e.target;
        // [FIX-SECURE] Chỉ trigger khi field có dữ liệu GỐC (snapshot lúc mở form).
        // Xóa key sau khi trigger → các ký tự tiếp không hỏi lại mật khẩu.
        if (SECURE_FIELDS[name] && originalObjSecureValues.current[name]) {
          delete originalObjSecureValues.current[name];
          requestSecure(SECURE_FIELDS[name], () =>
            setObjectData(prev => {
              const nd = { ...prev };
              if (['birthDate','issueDate','invitationDate','ngayChuyen','reportDate','decisionDate','prosecutionDateObj','custodyDecisionDate','detentionDecisionDate'].includes(name)) {
                nd[name] = DateUtils.parseFromVietnamese(value);
              } else {
                nd[name] = value;
              }
              return nd;
            })
          );
          return;
        }
        
        setObjectData(prev => {
          const newData = { ...prev };
          
          if (name === 'behavior') {
            const selectedBehaviors = value.split(',').map(b => b.trim()).filter(b => b);
            newData[name] = selectedBehaviors;
          } else if (['birthDate', 'issueDate', 'invitationDate', 'ngayChuyen', 'reportDate', 'decisionDate', 'prosecutionDateObj', 'custodyDecisionDate', 'detentionDecisionDate'].includes(name)) {
            newData[name] = DateUtils.parseFromVietnamese(value);
          } else {
            newData[name] = value;
          }
          
          return newData;
        });

        setCurrentBehavior(value);
        setFilteredBehaviors(
          caseTypesList.filter(
            ct => ct.toLowerCase().includes(value.toLowerCase()) && 
            (!objectData.behavior || !objectData.behavior.includes(ct))
          )
        );
      }, [caseTypesList, objectData.behavior]);
      
      const addBehavior = useCallback(() => {
        if (currentBehavior && 
            caseTypesList.includes(currentBehavior) && 
            (!objectData.behavior || !objectData.behavior.includes(currentBehavior))) {
          setObjectData(prev => ({ 
            ...prev, 
            behavior: [...(prev.behavior || []), currentBehavior] 
          }));
          setCurrentBehavior('');
          setFilteredBehaviors(
            caseTypesList.filter(ct => 
              !objectData.behavior || !objectData.behavior.includes(ct)
            )
          );
        }
      }, [currentBehavior, caseTypesList, objectData.behavior]);
      
      const removeBehavior = useCallback((index) => {
        setObjectData(prev => ({
          ...prev,
          behavior: prev.behavior.filter((_, i) => i !== index)
        }));
      }, []);
      
      const handleUndoField = useCallback((name) => {
        setObjectData(prev => ({ 
          ...prev, 
          [name]: previousValues[name] || '' 
        }));
        
        // Update flatpickr if it's a date field
        if (['birthDate', 'issueDate', 'reportDate', 'decisionDate', 'prosecutionDateObj', 'custodyDecisionDate', 'detentionDecisionDate'].includes(name)) {
          FlatpickrManager.update(name, previousValues[name]);
        }

            <button
              className="btn btn-success btn-xs"
              onClick={() => handleUndoField(name)}
            >
              Ok
            </button>
          );
        }
        return null;
      }, [objectData, previousValues, handleUndoField]);
      
      const handleWordImport = (file) => {
        if (!file) return;
        setWordImporting(true);
        parseWordDocClientSide(file).then(function(result) {
          if (!result) {
            setErrorMessage('⚠️ Không đọc được file Word.');
            setWordImporting(false);
            if (wordImportRef.current) wordImportRef.current.value = '';
            return;
          }
          if (result.error) {
            setErrorMessage('❌ ' + result.error);
            setWordImporting(false);
            if (wordImportRef.current) wordImportRef.current.value = '';
            return;
          }
          if (result.data && Object.keys(result.data).length > 0) {
            setObjectData(function(prev){ return Object.assign({}, prev, result.data); });
            const DATE_FIELDS = ['birthDate','issueDate','invitationDate','ngayChuyen','reportDate','decisionDate','prosecutionDateObj','custodyDecisionDate','detentionDecisionDate'];
            // Use a slightly longer timeout to ensure Flatpickr useEffect has re-run
            setTimeout(function() {
              DATE_FIELDS.forEach(function(f) {
                if (result.data[f]) {
                  try { FlatpickrManager.update(f, result.data[f]); } catch(e) {}
                }
              });
            }, 300);
            const filled = Object.keys(result.data).length;
            const warns = result.warnings || [];
            let msg = '✅ Đã nhập ' + filled + ' trường từ file Word!';
            if (warns.length) msg += ' ⚠️ ' + warns.join('; ');

        // Giảm từ ~30–80 KB/ảnh xuống ~3–5 KB — tiết kiệm ~95% Firestore bandwidth
        try {
          const base64 = await compressImage(file, 113, 151, 0.65);
          setObjectData(prev => ({ ...prev, [field]: base64 }));

          console.warn('[handlePhotoUpload] Nén ảnh thất bại, dùng ảnh gốc:', err);
