                  <div><label className="form-label">Số lệnh tạm giam</label><input type="text" name="lenhTamGiamSo" value={objectData.lenhTamGiamSo||''} onChange={handleObjectInputChange} className="form-control" /></div>
                  <div><label className="form-label">Ngày lệnh tạm giam</label><FpDateInput name="lenhTamGiamNgay" value={objectData.lenhTamGiamNgay||''} onChange={handleObjectInputChange} className="form-control" /></div>
                </div>
              </div>
            )}

            {/* Tab: Bổ sung */}
            {bbActiveTab==='extra' && (
              <div className="bb-tab-pane active">
                <div className="form-row">
                  <div><label className="form-label">Tạm giữ (thông tin)</label><textarea name="tamGiu" value={objectData.tamGiu||''} onChange={handleObjectInputChange} className="form-control" rows={2} placeholder="Thông tin về đồ vật, tài liệu bị tạm giữ..." /></div>
                  <div><label className="form-label">Tiền án <span style={{fontSize:'11px',color:'#64748b'}}>(số lần, tội danh; ghi "Không" nếu không có)</span></label><textarea name="tienAn" value={objectData.tienAn||''} onChange={handleObjectInputChange} className="form-control" rows={2} placeholder="Không" /></div>
                  <div><label className="form-label">Tiền sự <span style={{fontSize:'11px',color:'#64748b'}}>(số lần, hành vi; ghi "Không" nếu không có)</span></label><textarea name="tienSu" value={objectData.tienSu||''} onChange={handleObjectInputChange} className="form-control" rows={2} placeholder="Không" /></div>
                  <div><label className="form-label">Thông tin đối tượng 2</label><textarea name="thongTinDt2" value={objectData.thongTinDt2||''} onChange={handleObjectInputChange} className="form-control" rows={2} placeholder="Thông tin bổ sung..." /></div>
                  <div><label className="form-label">Ghi chú biên bản</label><textarea name="ghiChuBB" value={objectData.ghiChuBB||''} onChange={handleObjectInputChange} className="form-control" rows={2} /></div>
                </div>
              </div>
            )}
          </div>

          <div style={{display: 'flex', gap: '8px', marginTop: '16px', padding: '14px 0 0', borderTop: '1px solid #e2e8f0', flexWrap: 'wrap'}}>
            <button className="btn btn-success" onClick={handleSubmitObject}>💾 Lưu đối tượng</button>
            <button className="btn btn-primary" onClick={exportResume}>📄 Xuất lý lịch</button>
            <button className="btn btn-gray" onClick={() => {
              if (editingIndex !== null && window.confirm('Bạn có thay đổi chưa được lưu. Bạn có chắc muốn hủy và mất dữ liệu này không?')) {
                setShowObjectForm(false);
              } else if (editingIndex === null) {
                setShowObjectForm(false);
              }
            }} style={{marginLeft: 'auto'}}>✕ Hủy</button>
          </div>
          </div>
        </div>
      );
    };
    
    // CaseForm Component (continuing...)
    const CaseForm = ({ 
      caseData, 
      setCaseData, 
      tempObjects, 
      setTempObjects, 
      editingCaseId, 
      isEditing, 
      setIsEditing, 
      setShowForm, 
      setViewMode, 
      cases, 
      setCases, 
      setShowObjectForm, 
      setObjectData, 
      setEditingIndex, 
      setDeleteIndex, 
      setShowConfirm, 
      setUndoData, 
      setErrorMessage, 
      setSuccessMessage, 
      assigneesList, 
      receivingUnitsList, 
      caseTypesList, 
      handlingMethodsList,
      hasUnsavedChanges
    }) => {
      const [typeInput, setTypeInput] = useState(caseData.type.join(', '));
      const [currentType, setCurrentType] = useState('');
      const [filteredCaseTypes, setFilteredCaseTypes] = useState(caseTypesList);
      const [showKetQua, setShowKetQua] = useState(true);
      
      const dateReceivedRef = useRef(null);
      const ngayKetThucRef = useRef(null);
      const investigationConclusionDateRef = useRef(null);
      const prosecutionDateRef = useRef(null);
      const penaltyDateRef = useRef(null);
      const transferDateRef = useRef(null);
      const reportDateRef = useRef(null);
      const tinBaoNgayKetThucRef = useRef(null);
      
      // Auto-calculate investigation expiration date
      useEffect(() => {
        if (caseData.investigationResult === 'khởi tố vụ án' && caseData.prosecutionDate && caseData.crimeType) {
          const totalMonths = calculateTotalInvestigationMonths(caseData.crimeType, caseData.extensionCount);
          const newExpirationDate = DateUtils.addMonths(caseData.prosecutionDate, totalMonths);
          setCaseData(prev => ({ ...prev, expirationDate: newExpirationDate }));
        }
      }, [caseData.prosecutionDate, caseData.crimeType, caseData.extensionCount]);
      
      // Warning checks
      useEffect(() => {
        const dl = DateUtils.daysLeft(caseData.expirationDate);
        const maxExt = maxInvestigationExtensions[caseData.crimeType] || 0;
        const extCount = caseData.extensionCount || 0;
        const isAtMax = extCount >= maxExt;
        const isCompleted = caseData.status === 'hoàn thành';
        
        if (dl <= 10 && extCount < maxExt) {
          setErrorMessage('Yêu cầu gia hạn điều tra');
        } else if (dl <= 10 && isAtMax && !isCompleted) {
          setErrorMessage('Yêu cầu hoàn thành vụ việc');
        } else {
          setErrorMessage(null);
        }
      }, [caseData.expirationDate, caseData.extensionCount, caseData.crimeType, caseData.status]);
      
      // Initialize Flatpickr instances
      useEffect(() => {
        FlatpickrManager.destroyAll();
        
        FlatpickrManager.create(
          dateReceivedRef,
          'dateReceived',
          caseData.dateReceived,
          (dateStr) => handleInputChange({ target: { name: 'dateReceived', value: dateStr } })
        );
        
        FlatpickrManager.create(
          ngayKetThucRef,
          'ngayKetThuc',
          caseData.ngayKetThuc,
          (dateStr) => handleInputChange({ target: { name: 'ngayKetThuc', value: dateStr } })
        );
        
        if (caseData.investigationResult === 'khởi tố vụ án') {
          FlatpickrManager.create(
            investigationConclusionDateRef,
            'investigationConclusionDate',
            caseData.investigationConclusionDate,
            (dateStr) => handleInputChange({ target: { name: 'investigationConclusionDate', value: dateStr } })
          );
          
          FlatpickrManager.create(
            prosecutionDateRef,
            'prosecutionDate',
            caseData.prosecutionDate,
            (dateStr) => handleInputChange({ target: { name: 'prosecutionDate', value: dateStr } })
          );
        }
        
        if (caseData.investigationResult === 'xử phạt hành chính') {
          FlatpickrManager.create(
            penaltyDateRef,
            'penaltyDate',
            caseData.penaltyDate,
            (dateStr) => handleInputChange({ target: { name: 'penaltyDate', value: dateStr } })
          );
        }
        
        if (caseData.investigationResult === 'tin báo') {
          FlatpickrManager.create(
            reportDateRef,
            'reportDate',
            caseData.reportDate,
            (dateStr) => handleInputChange({ target: { name: 'reportDate', value: dateStr } })
          );
          FlatpickrManager.create(
            tinBaoNgayKetThucRef,
            'tinBaoNgayKetThuc',
            caseData.tinBaoNgayKetThuc,
            (dateStr) => handleInputChange({ target: { name: 'tinBaoNgayKetThuc', value: dateStr } })
          );
        }
        
        if (caseData.investigationResult === 'Chuyển hồ sơ') {
          FlatpickrManager.create(
            transferDateRef,
            'transferDate',
            caseData.transferDate,
            (dateStr) => handleInputChange({ target: { name: 'transferDate', value: dateStr } })
          );
        }
        
        return () => {
          FlatpickrManager.destroyAll();
        };
      }, [caseData.investigationResult]);
      
      const handleInputChange = useCallback((e) => {
        const { name, value } = e.target;
        
        setCaseData(prev => {
          let newCaseData = { ...prev };
          
          if (name === 'type') {
            setTypeInput(value);
            const selectedTypes = value.split(',').map(t => t.trim()).filter(t => t);
            newCaseData = { ...prev, [name]: selectedTypes };
          } else if (name === 'reportDate') {
            newCaseData = { ...prev, [name]: DateUtils.parseFromVietnamese(value) };
            if (!newCaseData.expirationDate) {
              newCaseData.expirationDate = DateUtils.addMonths(DateUtils.parseFromVietnamese(value), 4);
            }
          } else if (['dateReceived', 'investigationConclusionDate', 'prosecutionDate', 'penaltyDate', 'transferDate', 'ngayKetThuc', 'tinBaoNgayKetThuc'].includes(name)) {
            newCaseData = { ...prev, [name]: DateUtils.parseFromVietnamese(value) };
          } else {
            newCaseData = { ...prev, [name]: value };
          }
          
          return newCaseData;
        });
      }, []);
      
      const handleCurrentTypeChange = useCallback((e) => {
        const value = e.target.value;
        setCurrentType(value);
        setFilteredCaseTypes(
          caseTypesList.filter(
            ct => ct.toLowerCase().includes(value.toLowerCase()) && !caseData.type.includes(ct)
          )
        );
      }, [caseTypesList, caseData.type]);
      
      const addType = useCallback(() => {
        if (currentType && caseTypesList.includes(currentType) && !caseData.type.includes(currentType)) {
          setCaseData(prev => ({ ...prev, type: [...prev.type, currentType] }));
          setTypeInput([...caseData.type, currentType].join(', '));
          setCurrentType('');
          setFilteredCaseTypes(caseTypesList.filter(ct => !caseData.type.includes(ct)));
        }
      }, [currentType, caseTypesList, caseData.type]);
      
      const handleAddObjectClick = useCallback(() => {
        console.log('handleAddObjectClick called, setting showObjectForm to true');
        setEditingIndex(null);
        setObjectData({
          name: '',
          gender: '',
          alias: 'Không',
          birthDate: '',
          birthPlace: '',
          hometown: '',
          nationality: 'Việt Nam',
          ethnicity: 'Kinh',
          religion: 'Không',
          idNumber: '',
          issueDate: '',
          issuePlace: '',
          education: '',
          occupation: '',
          workplace: '',
          permanentAddress: '',
          phoneNumber: '',
          temporaryResidence: '',
          currentResidence: '',
          familyBackground: '',
          relationship: '',
          handlingMethod: '',
          behavior: [],
          penaltyForm: '',
          administrativeRecordNumber: '',
          administrativeDecisionNumber: '',
          reportDate: '',
          decisionDate: '',
          prosecutionDateObj: '',
          prosecutionDecisionObj: '',
          detentionDecisionDate: '',
          detentionDecisionNumber: '',
          custodyDecisionDate: '',
          custodyDecisionNumber: '',
          crimeType: '',
          custodyExtensionCount: '0',
          detentionExtensionCount: '0',
          custodyExpirationDate: '',
          detentionExpirationDate: '',
          tienAn: '',
          tienSu: '',
          photo: '',
          photoLeft: '',
          photoRight: ''
        });
        setShowObjectForm(true);
      }, []);
      
      const handleEditObject = useCallback((index) => {
        console.log('Editing object at index:', index);
        setObjectData({ ...tempObjects[index] });
        setEditingIndex(index);
        setShowObjectForm(true);
      }, [tempObjects]);
      
      const handleDeleteConfirm = useCallback((index) => {
        console.log('handleDeleteConfirm called with index:', index);
        if (window.confirm('Bạn có chắc chắn muốn xóa đối tượng này?')) {
          const updatedObjects = tempObjects.filter((_, i) => i !== index);
          setTempObjects(updatedObjects);
          setSuccessMessage('Đã xóa đối tượng thành công'); addToast && addToast('Đã xóa đối tượng thành công', 'success');
        }
      }, [tempObjects]);
      
      const handleSubmitCase = useCallback((e) => {
        e.preventDefault();
        console.log('Submitting case:', caseData);
        console.log('Temp objects:', tempObjects);
        
        if (!caseData.id || !caseData.type || caseData.type.length === 0 || !caseData.dateReceived) {
          setErrorMessage('Vui lòng điền đầy đủ các trường bắt buộc: Mã số vụ, Loại vụ việc, Ngày tiếp nhận.');
          return;
        }
        
        if (!editingCaseId && cases.some(function(c){ return c.id === caseData.id; })) {
          setErrorMessage('Mã số vụ đã tồn tại. Vui lòng chọn mã số khác.');
          return;
        }
        
        console.log('Updating cases...');
        let updatedCases;
        
        if (editingCaseId !== null) {
          updatedCases = cases.map(function(c) {
            return c.id === editingCaseId ? Object.assign({}, caseData, { objects: tempObjects }) : c;
          });
        } else {
          updatedCases = cases.concat([Object.assign({}, caseData, { objects: tempObjects, id: caseData.id })]);
        }
        
        saveCasesToDB(updatedCases).then(function() {
          setCases(updatedCases);
          setCaseData({
            id: '', type: [], dateReceived: '', description: '', seizedItems: '',
            assignee: '', directAssignee: '', investigationResult: '', crimeType: '',
            extensionCount: 0, investigationConclusionDate: '', prosecutionDate: '',
            prosecutionDecision: '', penaltyDate: '', penaltyDecision: '',
            transferDate: '', receivingUnit: '', status: 'đang thực hiện',
            reportDate: '', expirationDate: '', notes: '', objects: [],
            phanLoaiTin: '', noixayra: '', tinBaoKetQua: '', tinBaoNgayKetThuc: ''
          });
          setTempObjects([]);
          setShowForm(false);
          setIsEditing(false);
          setViewMode('list');
          addToast('Vụ việc đã được lưu thành công!', 'success');
          AudioManager.successSound();
          setHasUnsavedChanges(false);
        }).catch(function(error) {
          console.error('Error saving case:', error);
          addToast('Không thể lưu vụ việc vào cơ sở dữ liệu. Vui lòng thử lại!', 'error');
        });
      }, [caseData, tempObjects, editingCaseId, cases]);
      
      const daysLeft = DateUtils.daysLeft;
      
      const showRedCustody = useCallback((obj) => {
        const dl = daysLeft(obj.custodyExpirationDate);
        return dl <= 2 && (!obj.detentionDecisionDate || !obj.detentionDecisionNumber);
      }, []);
      
      const showRedDetention = useCallback((obj, status) => {
        const dl = daysLeft(obj.detentionExpirationDate);
        if (dl > 10) return false;
        const maxExt = maxDetentionExtensions[obj.crimeType] || 0;
        const extCount = parseInt(obj.detentionExtensionCount) || 0;
        const isAtMax = extCount >= maxExt;
        const isCompleted = status === 'hoàn thành';
        return !isAtMax || (isAtMax && !isCompleted);
      }, []);
      
      const getDetentionColor = useCallback((obj, status) => {
        const dl = daysLeft(obj.detentionExpirationDate);
        return dl <= 10 ? 'text-red-500' : 'text-green-500';
      }, []);
      
      const isInvestigationRed = useCallback(() => {
        const dl = daysLeft(caseData.expirationDate);
        if (dl > 10) return false;
        const maxExt = maxInvestigationExtensions[caseData.crimeType] || 0;
        const extCount = caseData.extensionCount || 0;
        const isAtMax = extCount >= maxExt;
        const isCompleted = caseData.status === 'hoàn thành';
        return !isAtMax || (isAtMax && !isCompleted);
      }, [caseData]);
      
      const getInvestigationColor = useCallback(() => {
        const dl = daysLeft(caseData.expirationDate);
        return dl <= 10 ? 'text-red-500' : 'text-green-500';
      }, [caseData.expirationDate]);
      
      return (
        <div className="card">
          <div className="card-header">
            {editingCaseId ? "✏️ Chỉnh Sửa Vụ Việc" : "➕ Thêm Vụ Việc Mới"}
            {hasUnsavedChanges && <span className="unsaved-indicator" style={{marginLeft: 'auto'}}>● Chưa lưu</span>}
          </div>
          <div className="card-body">
          {/* ===== FRAME 1: MÃ SỐ VỤ + THÔNG TIN CƠ BẢN ===== */}
          <div className="form-section-frame blue-frame">
          <div className="form-row" style={{gridTemplateColumns: 'repeat(4, 1fr)', gap:'8px'}}>
            <div>
              <label className={`form-label${caseData.id ? ' label-filled' : ''}`}>Mã số vụ <span style={{color:'red'}}>*</span></label>
              <input
                type="text"
                name="id"
                value={caseData.id}
                onChange={handleInputChange}
                placeholder="Nhập mã số vụ"
                className="form-control"
                readOnly={!isEditing}
              />
            </div>
            <div>
              <label className={`form-label${caseData.phanLoaiTin ? ' label-filled' : ''}`}>Phân loại tin</label>
              <select
                name="phanLoaiTin"
                value={caseData.phanLoaiTin || ''}
                onChange={handleInputChange}
                className="form-control"
                disabled={!isEditing}
              >
                <option value="">-- Chọn loại --</option>
                <option value="Vụ việc/vụ án">Vụ việc/vụ án</option>
                <option value="Tin báo">Tin báo</option>
              </select>
            </div>
            <div>
              <label className={`form-label${caseData.dateReceived ? ' label-filled' : ''}`}>Ngày tiếp nhận <span style={{color:'red'}}>*</span></label>
              <input
                type="text"
                ref={dateReceivedRef}
                name="dateReceived"
                placeholder="dd/mm/yyyy"
                className="form-control"
                readOnly={!isEditing}
              />
            </div>
            <div>
              <label className={`form-label${caseData.ngayKetThuc ? ' label-filled' : ''}`}>Ngày kết thúc</label>
              <input type="text" ref={ngayKetThucRef} name="ngayKetThuc" placeholder="dd/mm/yyyy" className="form-control" disabled={!isEditing} title="Ngày hoàn thành hồ sơ ban đầu" />
              <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}}>Ngày hoàn thành hồ sơ ban đầu</div>
            </div>
          </div>
          </div>

          {/* ===== FRAME 2: NƠI XẢY RA + TRẠNG THÁI ===== */}
          <div className="form-section-frame green-frame" style={{marginBottom:'10px'}}>
          <div style={{display:'grid', gridTemplateColumns:'1fr 130px', gap:'10px', alignItems:'end'}}>
            <div>
              <label className={`form-label${caseData.noixayra ? ' label-filled' : ''}`}>Nơi xảy ra vụ việc</label>
              <input type="text" name="noixayra" value={caseData.noixayra||''} onChange={handleInputChange} className="form-control" disabled={!isEditing} placeholder="Địa điểm xảy ra..." />
            </div>
            <div>
              <label className={`form-label${caseData.status ? ' label-filled' : ''}`}>Trạng thái</label>
              <select
                name="status"
                value={caseData.status}
                onChange={handleInputChange}
                className="form-control"
                disabled={!isEditing}
              >
                <option value="đang thực hiện">Đang thực hiện</option>
                <option value="hoàn thành">Hoàn thành</option>
              </select>
            </div>
          </div>
          </div>

          <div className="form-row" style={{marginTop:'8px'}}>
            <div className="col-span-2">
              <label className={`form-label${typeInput ? ' label-filled' : ''}`}>Loại vụ việc <span style={{color:'red'}}>*</span></label>
              <input
                type="text"
                name="type"
                value={typeInput}
                onChange={handleInputChange}
                placeholder="Nhập loại vụ việc, cách nhau bằng dấu phẩy"
                className="form-control"
                disabled={!isEditing}
              />
              <input
                type="text"
                value={currentType}
                onChange={handleCurrentTypeChange}
                placeholder="Tìm kiếm để thêm"
                className="form-control" style={{marginTop: "8px"}}
                list="caseTypesList"
                disabled={!isEditing}
              />
              <datalist id="caseTypesList">
                {filteredCaseTypes.map((type, index) => (
                  <option key={index} value={type} />
                ))}
              </datalist>
              <button
                className="btn btn-primary btn-sm" style={{marginTop: '6px'}}
                onClick={addType}
                disabled={!isEditing || !currentType}
              >
                Thêm
              </button>
            </div>
          </div>

          <div className="form-row" style={{marginTop:'8px'}}>
            <div className="col-span-2">
              <label className={`form-label${caseData.description ? ' label-filled' : ''}`}>Nội dung vụ việc</label>
              <textarea
                name="description"
                value={caseData.description || ''}
                onChange={handleInputChange}
                placeholder="Nhập nội dung vụ việc"
                className="form-control"
                readOnly={!isEditing}
              />
            </div>
            
            <div className="col-span-2">
              <label className={`form-label${(tempObjects.map(obj=>obj.tamGiu).filter(Boolean).join('\n')||caseData.seizedItems) ? ' label-filled' : ''}`}>Đồ vật, tài liệu bị tạm giữ <span style={{fontSize:'11px',color:'#64748b'}}>(tự động cập nhật từ "Tạm giữ (thông tin)" của đối tượng)</span></label>
              <textarea
                name="seizedItems"
                value={tempObjects.map(obj => obj.tamGiu).filter(Boolean).join('\n') || caseData.seizedItems || ''}
                onChange={handleInputChange}
                placeholder="Tự động cập nhật từ thông tin tạm giữ của các đối tượng"
                className="form-control"
                readOnly={!isEditing}
              />
            </div>
            
            <div>
              <label className={`form-label${caseData.assignee ? ' label-filled' : ''}`}>Người thụ lý chính</label>
              <input
                type="text"
                name="assignee"
                value={caseData.assignee}
                onChange={handleInputChange}
                placeholder="Nhập hoặc chọn người thụ lý"
                className="form-control"
                list="assignees"
                disabled={!isEditing}
              />
              <datalist id="assignees">
                {assigneesList.map((assignee, index) => (
                  <option key={index} value={assignee} />
                ))}
              </datalist>
            </div>
            
            <div>
              <label className={`form-label${caseData.directAssignee ? ' label-filled' : ''}`}>Người trực tiếp làm</label>
              <input
                type="text"
                name="directAssignee"
                value={caseData.directAssignee}
                onChange={handleInputChange}
                placeholder="Nhập người trực tiếp làm"
                className="form-control"
                readOnly={!isEditing}
              />
            </div>
            
            <div style={{gridColumn:'1/-1', border:'2px solid #7c3aed', borderRadius:'8px', padding:'10px', background:'#f5f3ff', marginTop:'4px'}}>
              <div style={{fontWeight:700, color:'#5b21b6', fontSize:'12px', marginBottom: showKetQua ? '8px':'0', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                <span>📊 KẾT QUẢ ĐIỀU TRA</span>
                <button type="button" onClick={()=>setShowKetQua(p=>!p)} style={{fontSize:'11px',padding:'2px 10px',borderRadius:'8px',border:'1px solid #7c3aed',background:'#ede9fe',color:'#5b21b6',cursor:'pointer',fontWeight:600}}>
                  {showKetQua ? '🔼 Thu gọn' : '🔽 Mở rộng'}
                </button>
              </div>
              {showKetQua && <div className="form-row">
            <div>
              <label className="form-label">Kết quả điều tra</label>
              <select
                name="investigationResult"
                value={caseData.investigationResult}
                onChange={handleInputChange}
                className="form-control"
                disabled={!isEditing}
              >
                <option value="">Chọn kết quả điều tra</option>
                {investigationResults.map((result, index) => (
                  <option key={index} value={result}>{result}</option>

      const [bgGradient, setBgGradient] = useState(() => localStorage.getItem('loginBgGradient') || '#0f172a,#1e3a8a,#0f172a');
      const [bgColor, setBgColor] = useState(() => localStorage.getItem('loginBgColor') || '#0f172a');
      const [bgImage, setBgImage] = useState(() => localStorage.getItem('loginBgImage') || '');

      const gradientPresets = [
        { label: 'Xanh đậm (mặc định)', value: '#0f172a,#1e3a8a,#0f172a' },
        { label: 'Xanh lá rừng', value: '#064e3b,#065f46,#064e3b' },
        { label: 'Tím hoàng gia', value: '#2e1065,#4c1d95,#2e1065' },
        { label: 'Đỏ thẫm', value: '#450a0a,#7f1d1d,#450a0a' },
        { label: 'Xám chuyên nghiệp', value: '#0f172a,#1e293b,#334155' },
        { label: 'Vàng đất', value: '#431407,#7c2d12,#431407' },
      ];

      const buildBgStyle = () => {
        if (bgMode === 'color') return { background: bgColor };
        if (bgMode === 'image' && bgImage) return { backgroundImage: `url(${bgImage})`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat' };
        const parts = bgGradient.split(',');
        return { background: `linear-gradient(135deg, ${parts[0]} 0%, ${parts[1]} 50%, ${parts[2] || parts[0]} 100%)` };
      };

      const saveBg = (mode, grad, color, img) => {
        localStorage.setItem('loginBgMode', mode);
        localStorage.setItem('loginBgGradient', grad);
        localStorage.setItem('loginBgColor', color);
        if (img) localStorage.setItem('loginBgImage', img);
        else localStorage.removeItem('loginBgImage');
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const data = ev.target.result;
          setBgImage(data);
          setBgMode('image');
          saveBg('image', bgGradient, bgColor, data);
        };
        reader.readAsDataURL(file);
      };

      const handleLogin = useCallback((e) => {
        e.preventDefault();
        setLoginError('');
        hashPassword(password).then(function(hashedPassword) {
          return getUserFromDB(username).then(function(user) {
            if (user && user.password === hashedPassword) {
              sessionStorage.setItem('loggedIn', 'true');
              sessionStorage.setItem('username', username);
              setLoggedIn(true);
            } else {
              setLoginError('Tên đăng nhập hoặc mật khẩu không đúng.');
              setShake(true);
              setTimeout(function(){ setShake(false); }, 500);
            }
          });
        }).catch(function(error) {
          console.error('Login error:', error);
          setLoginError('Lỗi khi đăng nhập. Vui lòng thử lại.');
        });
      }, [username, password]);
      
      return (
        <div className="login-background" style={buildBgStyle()}>

                {bgMode === 'image' && (
                  <div>
                    <label style={{display: 'block', padding: '8px 12px', background: 'rgba(59,130,246,0.2)', border: '1px dashed #3b82f6', borderRadius: '6px', cursor: 'pointer', color: '#93c5fd', fontSize: '11px', textAlign: 'center'}}>
                      📁 Chọn ảnh từ máy tính (.jpg, .png)
                      <input type="file" accept="image/*" onChange={handleImageUpload} style={{display: 'none'}} />
                    </label>
                    {bgImage && (
                      <div style={{marginTop: '8px', display: 'flex', alignItems: 'center', gap: '8px'}}>
                        <img src={bgImage} alt="preview" style={{width: '48px', height: '32px', objectFit: 'cover', borderRadius: '4px', border: '1px solid rgba(255,255,255,0.2)'}} />
                        <span style={{color: '#86efac', fontSize: '11px'}}>✓ Đã chọn ảnh</span>
                        <button type="button" onClick={() => { setBgImage(''); setBgMode('gradient'); saveBg('gradient', bgGradient, bgColor, ''); }}
                          style={{marginLeft: 'auto', background: 'none', border: 'none', color: '#f87171', cursor: 'pointer', fontSize: '11px'}}>✕ Xóa</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            <p style={{marginTop: '12px', fontSize: '11px', color: '#94a3b8', textAlign: 'center'}}>
              Tài khoản mặc định: admin / password
            </p>
          </div>
        </div>
      );
    };
    
    // ==================== ChangeCredentialsForm Component ====================
    const ChangeCredentialsForm = ({ setShowChangeForm, setErrorMessage }) => {
      const [newUsername, setNewUsername] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      
      const handleChange = useCallback((e) => {
        e.preventDefault();
        
        if (newPassword !== confirmPassword) {
          setErrorMessage('Mật khẩu xác nhận không khớp.');
          return;
        }
        
        hashPassword(newPassword).then(function(hashedNewPassword) {
          const user = { 
            username: newUsername || sessionStorage.getItem('username'), 
            password: hashedNewPassword 
          };
          return saveUserToDB(user);
        }).then(function() {
          setErrorMessage(null);
          setShowChangeForm(false);
          sessionStorage.clear();
          window.location.reload();
        }).catch(function(error) {
          console.error('Error changing credentials:', error);
          setErrorMessage('Không thể thay đổi thông tin. Vui lòng thử lại.');
        });
      }, [newUsername, newPassword, confirmPassword]);
      
      return (
        <div className="modal-overlay">
          <div className="modal-box" style={{width: '420px'}}>
            <div className="modal-header">
              👤 Thay Đổi Tài Khoản
              <button className="modal-close" onClick={() => setShowChangeForm(false)}>×</button>
            </div>
            <form onSubmit={handleChange}>
              <div className="modal-body">
                <div className="form-group">
                  <label className="form-label">Tên đăng nhập mới <span style={{color: '#94a3b8', fontWeight: 400}}>(tùy chọn)</span></label>
                  <input type="text" value={newUsername} onChange={(e) => setNewUsername(e.target.value)}
                    className="form-control" placeholder={`Hiện tại: ${sessionStorage.getItem('username') || 'admin'}`} />
                </div>
                <div className="form-group">
                  <label className="form-label">Mật khẩu mới <span className="required-mark">*</span></label>
                  <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)}
                    className="form-control" placeholder="Nhập mật khẩu mới" required />
                </div>
                <div className="form-group">
                  <label className="form-label">Xác nhận mật khẩu <span className="required-mark">*</span></label>
                  <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)}
                    className={`form-control ${confirmPassword && confirmPassword !== newPassword ? 'error' : ''}`}
                    placeholder="Nhập lại mật khẩu" required />
                  {confirmPassword && confirmPassword !== newPassword && (
                    <span style={{fontSize: '12px', color: '#dc2626'}}>❌ Mật khẩu không khớp</span>
                  )}
                </div>
                <div style={{background: '#fef3c7', padding: '10px 12px', borderRadius: '8px', fontSize: '12px', color: '#92400e'}}>
                  ⚠️ Sau khi thay đổi, bạn sẽ được đăng xuất và cần đăng nhập lại.
                </div>
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-gray" onClick={() => setShowChangeForm(false)}>Hủy</button>
                <button type="submit" className="btn btn-success">💾 Lưu thay đổi</button>
              </div>
            </form>
          </div>
        </div>
      );
    };
    
    // ==================== TinhHanComponent ====================
    const TinhHanComponent = ({ cases }) => {
      const [activeTab, setActiveTab] = useState(0);
      const [maSoVu, setMaSoVu] = useState('');
      const [tenBiCan, setTenBiCan] = useState('');
      const [toiDanh, setToiDanh] = useState('');
      const [ngayKhoiTo, setNgayKhoiTo] = useState('');
      const [loaiToiDieuTra, setLoaiToiDieuTra] = useState('it');
      const [ngayBat, setNgayBat] = useState('');
      const [loaiToiTamGiam, setLoaiToiTamGiam] = useState('it');
      const [ngayNhan, setNgayNhan] = useState('');
      const [loaiThuTuc, setLoaiThuTuc] = useState('phuc-hoi');
      const [loaiToiPhucHoi, setLoaiToiPhucHoi] = useState('it');
      const [ketQuaDieuTra, setKetQuaDieuTra] = useState('');
      const [ketQuaTamGiam, setKetQuaTamGiam] = useState('');
      const [ketQuaPhucHoi, setKetQuaPhucHoi] = useState('');
      const [lichSu, setLichSu] = useState([]);
      const [selectedCase, setSelectedCase] = useState(null);
      const [objectList, setObjectList] = useState([]);

      // When maSoVu changes, auto-fill objects and toiDanh
      useEffect(() => {
        if (!maSoVu || !cases) {
          setSelectedCase(null);
          setObjectList([]);
          return;
        }
        const found = cases.find(c => c.id === maSoVu);
        if (found) {
          setSelectedCase(found);
          const objs = (found.objects || []).map(o => o.name).filter(Boolean);
          setObjectList(objs);
          const loaiVuStr = Array.isArray(found.type) ? found.type.join(', ') : (found.type || '');
          setToiDanh(loaiVuStr);
          if (objs.length === 1) setTenBiCan(objs[0]);
          else setTenBiCan('');
        } else {
          setSelectedCase(null);
          setObjectList([]);
        }
      }, [maSoVu, cases]);

      const addMonthsExact = (date, months) => {
        const d = new Date(date);
        const day = d.getDate();
        d.setMonth(d.getMonth() + months);
        if (d.getDate() !== day) d.setDate(0);
        return d;
      };

      const fmtDate = (date) => {
        const d = new Date(date);
        return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
      };

      const addDaysLocal = (date, days) => {
        const d = new Date(date); d.setDate(d.getDate() + days); return d;
      };

      const luuLichSu = (loai, html, rows) => {
        const entry = {
          loai,
          maSoVu: maSoVu || 'Chưa nhập',
          tenBiCan: tenBiCan || 'Chưa nhập',
          toiDanh: toiDanh || 'Chưa nhập',
          thoiGian: new Date().toLocaleString('vi-VN'),
          noiDung: html.replace(/<[^>]*>/g,'').substring(0,150) + '...',
          rows: rows || []
        };
        setLichSu(prev => [entry, ...prev].slice(0, 30));
      };

      const buildRows = (rows) => rows.map(r =>
        '<div class="tinh-row ' + (r.ext ? 'ext' : '') + '"><strong>' + r.title + '</strong><br/>' +
        (r.startDate ? 'Từ: ' + r.startDate + ' &#8594; ' : '') +
        'Đến: <span class="tinh-date">' + r.endDate + ' 24:00</span></div>'
      ).join('');

      const cfgDieuTra = {
        'it':    { t:2, g:[2],       max:4,  ten:'Ít nghiêm trọng' },
        'nghiem':{ t:3, g:[3,2],     max:8,  ten:'Nghiêm trọng' },
        'rat':   { t:4, g:[4,4],     max:12, ten:'Rất nghiêm trọng' },
        'db':    { t:4, g:[4,4,4,4], max:20, ten:'Đặc biệt nghiêm trọng' },
        'anqg':  { t:4, g:[4,4,4,4,4], max:24, ten:'Đặc biệt nghiêm trọng (ANQG)' }
      };
      const cfgTamGiam = {
        'it':         { t:2, g:[1],       max:3,  ten:'Ít nghiêm trọng' },
        'nghiem':     { t:3, g:[2],        max:5,  ten:'Nghiêm trọng' },
        'rat':        { t:4, g:[3],        max:7,  ten:'Rất nghiêm trọng' },
        'db':         { t:4, g:[4,4,4,4],  max:20, ten:'Đặc biệt nghiêm trọng', sp:true },
        'anqg-nghiem':{ t:3, g:[2,4,1],    max:10, ten:'ANQG - Nghiêm trọng' },
        'anqg-rat':   { t:4, g:[3,4,2],    max:13, ten:'ANQG - Rất nghiêm trọng' },
        'anqg-db':    { t:4, g:[4,4,4,4],  max:20, ten:'ANQG - Đặc biệt nghiêm trọng', sp:true }
      };

      const parseCalcDate = (s) => {
        if (!s) return null;
        // Support ISO (YYYY-MM-DD) or dd/mm/yyyy
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s);
        if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [d,m,y]=s.split('/'); return new Date(`${y}-${m}-${d}`); }
        return null;
      };
      const tinhDieuTra = () => {
        if (!ngayKhoiTo) { alert('Vui lòng nhập ngày khởi tố vụ án!'); return; }
        const c = cfgDieuTra[loaiToiDieuTra];
        const start = parseCalcDate(ngayKhoiTo);
        if (!start || isNaN(start)) { alert('Ngày không hợp lệ!'); return; }
        const rows = [];
        let end = addMonthsExact(start, c.t);
        rows.push({ title:'THỜI HẠN THÔNG THƯỜNG (' + c.t + ' tháng)', startDate:fmtDate(start), endDate:fmtDate(end), ext:false });
        let cur = new Date(end); cur.setDate(cur.getDate() + 1);
        c.g.forEach((m,i) => {
          end = addMonthsExact(cur, m);
          rows.push({ title:'GIA HẠN LẦN ' + (i+1) + ' (' + m + ' tháng)', startDate:fmtDate(cur), endDate:fmtDate(end), ext:true });
          cur = new Date(end); cur.setDate(cur.getDate() + 1);
        });
        const html = '<div class="tinh-result"><div class="tinh-summary"><div class="tinh-big">' + c.max + ' tháng</div><div>Tối đa - ' + c.ten + '</div></div>' +
          buildRows(rows) + '<div class="tinh-note">Lưu ý: Thời hạn tính theo ngày trùng tháng sau.</div></div>';
        setKetQuaDieuTra(html);
        luuLichSu('Thời hạn Điều tra', html, rows.map(r => ({ ...r, loai: 'Điều tra', max: c.max, ten: c.ten })));
      };

      const tinhTamGiam = () => {
        if (!ngayBat) { alert('Vui lòng nhập ngày!'); return; }
        const c = cfgTamGiam[loaiToiTamGiam];
        const start = parseCalcDate(ngayBat);
        if (!start || isNaN(start)) { alert('Ngày không hợp lệ!'); return; }
        const rows = [];
        let end = addDaysLocal(start, c.t * 30 - 1);
        rows.push({ title:'THỜI HẠN THÔNG THƯỜNG (' + c.t + ' tháng)', startDate:fmtDate(start), endDate:fmtDate(end), ext:false });
        let cur = new Date(end); cur.setDate(cur.getDate() + 1);
        c.g.forEach((m,i) => {
          end = addDaysLocal(cur, m * 30 - 1);
          rows.push({ title:'GIA HẠN LẦN ' + (i+1) + ' (' + m + ' tháng)', startDate:fmtDate(cur), endDate:fmtDate(end), ext:true });
          cur = new Date(end); cur.setDate(cur.getDate() + 1);
        });
        const spNote = c.sp ? '<div class="tinh-note warning">⚠️ Đặc biệt: Sau các lần gia hạn, Viện trưởng VKSND tối cao có thể quyết định tiếp tục tạm giam.</div>' : '';
        const html = '<div class="tinh-result"><div class="tinh-summary"><div class="tinh-big">' + c.max + ' tháng</div><div>Tối đa - ' + c.ten + '</div></div>' +
          buildRows(rows) + spNote + '<div class="tinh-note">Lưu ý: 1 tháng = 30 ngày.</div></div>';
        setKetQuaTamGiam(html);
        luuLichSu('Thời hạn Tạm giam', html, rows.map(r => ({ ...r, loai: 'Tạm giam', max: c.max, ten: c.ten, spNote: c.sp || false })));
      };

      const tinhPhucHoi = () => {
        if (!ngayNhan) { alert('Vui lòng nhập ngày!'); return; }
        const start = parseCalcDate(ngayNhan);
        if (!start || isNaN(start)) { alert('Ngày không hợp lệ!'); return; }
        const rows = [];
        let html = '<div class="tinh-result">';
        let tieuDe = '';
        let maxTime = '';
        if (loaiThuTuc === 'phuc-hoi') {
          const c = { it:{t:2,g:1,max:3}, nghiem:{t:2,g:2,max:4}, rat:{t:3,g:2,max:5}, db:{t:3,g:3,max:6} }[loaiToiPhucHoi];
          tieuDe = 'PHỤC HỒI ĐIỀU TRA'; maxTime = c.max + ' tháng';
          let end = addMonthsExact(start, c.t);
          rows.push({ title:'THÔNG THƯỜNG (' + c.t + ' tháng)', startDate:fmtDate(start), endDate:fmtDate(end), ext:false });
          html += '<div class="tinh-summary"><div class="tinh-big">' + c.max + ' tháng</div><div>' + tieuDe + ' - Tối đa</div></div>';
          html += buildRows(rows);
          const nxt = new Date(end); nxt.setDate(nxt.getDate() + 1);
          end = addMonthsExact(nxt, c.g);
          const row2 = { title:'GIA HẠN (' + c.g + ' tháng)', endDate:fmtDate(end), ext:true };
          rows.push(row2);
          html += '<div class="tinh-row ext"><strong>' + row2.title + '</strong><br/>Kết thúc: <span class="tinh-date">' + row2.endDate + ' 24:00</span></div>';
        } else if (loaiThuTuc === 'bo-sung-vks') {
          tieuDe = 'ĐIỀU TRA BỔ SUNG (VKS TRẢ)'; maxTime = '4 tháng';
          html += '<div class="tinh-summary"><div class="tinh-big">4 tháng</div><div>' + tieuDe + '</div></div>';
          let end = addMonthsExact(start, 2);
          rows.push({ title:'TRẢ LẦN 1 (≤2 tháng)', startDate:fmtDate(start), endDate:fmtDate(end), ext:false });
          html += buildRows([rows[0]]);
          const nxt = new Date(end); nxt.setDate(nxt.getDate() + 1);
          end = addMonthsExact(nxt, 2);
          rows.push({ title:'TRẢ LẦN 2 (≤2 tháng)', endDate:fmtDate(end), ext:true });
          html += '<div class="tinh-row ext"><strong>TRẢ LẦN 2 (≤2 tháng)</strong><br/>Kết thúc tối đa: <span class="tinh-date">' + fmtDate(end) + ' 24:00</span></div>';
        } else if (loaiThuTuc === 'bo-sung-toa') {
          tieuDe = 'ĐIỀU TRA BỔ SUNG (TÒA TRẢ)'; maxTime = '2 tháng';
          html += '<div class="tinh-summary"><div class="tinh-big">2 tháng</div><div>' + tieuDe + '</div></div>';
          let end = addMonthsExact(start, 1);
          rows.push({ title:'TRẢ LẦN 1 (≤1 tháng)', startDate:fmtDate(start), endDate:fmtDate(end), ext:false });
          html += buildRows([rows[0]]);
          const nxt = new Date(end); nxt.setDate(nxt.getDate() + 1);
          end = addMonthsExact(nxt, 1);
          rows.push({ title:'TRẢ LẦN 2 (≤1 tháng)', endDate:fmtDate(end), ext:true });
          html += '<div class="tinh-row ext"><strong>TRẢ LẦN 2 (≤1 tháng)</strong><br/>Kết thúc tối đa: <span class="tinh-date">' + fmtDate(end) + ' 24:00</span></div>';
        } else {
          tieuDe = 'ĐIỀU TRA LẠI'; maxTime = 'Điều 172';
          html += '<div class="tinh-summary"><div class="tinh-big">Điều 172</div><div>' + tieuDe + '</div></div>';
          html += '<div class="tinh-note">Áp dụng thời hạn như vụ án mới. Dùng tab Thời hạn Điều tra.</div>';
        }
        html += '</div>';
        setKetQuaPhucHoi(html);
        luuLichSu('Phục hồi / Bổ sung / Lại', html, rows.map(r => ({ ...r, tieuDe, maxTime })));
      };

      // Export Word for timing calculation
      const xuatWordTinhHan = (loai) => {
        let resultHtml = '';
        let tieuDe = '';
        if (loai === 'dieu-tra') { resultHtml = ketQuaDieuTra; tieuDe = 'THỜI HẠN ĐIỀU TRA'; }
        else if (loai === 'tam-giam') { resultHtml = ketQuaTamGiam; tieuDe = 'THỜI HẠN TẠM GIAM'; }
        else { resultHtml = ketQuaPhucHoi; tieuDe = 'PHỤC HỒI / BỔ SUNG / ĐIỀU TRA LẠI'; }

        if (!resultHtml) {
          alert('Vui lòng tính toán trước khi xuất báo cáo!');
          return;
        }

        // Extract text from HTML
        const tmp = document.createElement('div');
        tmp.innerHTML = resultHtml;
        const summaryEl = tmp.querySelector('.tinh-summary');
        const summaryText = summaryEl ? summaryEl.innerText.trim() : '';
        const rowEls = tmp.querySelectorAll('.tinh-row');
        const rowTexts = Array.from(rowEls).map(el => el.innerText.trim());
        const noteEls = tmp.querySelectorAll('.tinh-note');
        const noteTexts = Array.from(noteEls).map(el => el.innerText.trim());

        const caseName = selectedCase ? selectedCase.id : (maSoVu || 'Chưa nhập');
        const caseDesc = selectedCase ? (Array.isArray(selectedCase.type) ? selectedCase.type.join(', ') : selectedCase.type || '') : toiDanh;

        const { Document, Packer, Paragraph, TextRun, AlignmentType } = window.docx;
        const TNR = (text, opts = {}) => new TextRun({
          text,
          font: { name: 'Times New Roman' },
          size: 28, // 14pt = 28 half-points
          ...opts
        });
        const para = (children, alignment, spacingAfter = 100) => new Paragraph({
          children,
          alignment: alignment || AlignmentType.LEFT,
          spacing: { after: spacingAfter }
        });

        const docChildren = [
          // Header - Quoc hieu centered
          para([TNR('CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM', { bold: true })], AlignmentType.CENTER, 60),
          para([TNR('Độc lập - Tự do - Hạnh phúc', { bold: true })], AlignmentType.CENTER, 60),
          para([TNR('─────────────────────────────────────────────────────────────────────', { color: '555555' })], AlignmentType.CENTER, 200),

          // Title
          para([TNR('BÁO CÁO TÍNH THỜI HẠN TỐ TỤNG HÌNH SỰ', { bold: true })], AlignmentType.CENTER, 60),
          para([TNR(tieuDe, { bold: true })], AlignmentType.CENTER, 300),

          // Case info
          para([TNR('Mã số vụ: ', { bold: true }), TNR(caseName)], AlignmentType.LEFT, 80),
          para([TNR('Bị can / Đối tượng: ', { bold: true }), TNR(tenBiCan || 'Chưa nhập')], AlignmentType.LEFT, 80),
          para([TNR('Tội danh / Loại vụ việc: ', { bold: true }), TNR(caseDesc || toiDanh || 'Chưa nhập')], AlignmentType.LEFT, 200),

          // Summary
          ...(summaryText ? [para([TNR(summaryText, { bold: true })], AlignmentType.CENTER, 150)] : []),

          // Timeline rows
          ...rowTexts.map(t => para([TNR(t)], AlignmentType.LEFT, 80)),

          // Notes
          ...(noteTexts.length > 0
            ? [new Paragraph({ spacing: { after: 60 } }), ...noteTexts.map(t => para([TNR(t, { italics: true, color: '1e40af' })], AlignmentType.LEFT, 60))]
            : []),

          // Spacing
          new Paragraph({ spacing: { after: 300 } }),

          // Signature block - right aligned
          para([TNR('Ngày ..... tháng ..... năm ..........', { italics: true })], AlignmentType.RIGHT, 60),
          para([TNR('NGƯỜI LẬP BIÊN BẢN', { bold: true })], AlignmentType.RIGHT, 60),
          para([TNR('(Ký, ghi rõ họ tên)', { italics: true })], AlignmentType.RIGHT, 300),
        ];

        try {
          const doc = new Document({
            sections: [{
              properties: {
                page: { margins: { top: 1134, right: 1134, bottom: 1134, left: 1417 } }
              },
              children: docChildren
            }]
          });
          Packer.toBlob(doc).then(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (caseName || 'ThoiHan') + '_' + tieuDe.replace(/ /g,'_') + '.docx';
            a.click();
            URL.revokeObjectURL(url);
          }).catch(err => {
            console.error('Lỗi xuất DOCX:', err);
            alert('Không thể xuất file. Vui lòng thử lại.');
          });
        } catch(err) {
          console.error('Lỗi tạo tài liệu:', err);
          alert('Không thể tạo file Word. Vui lòng thử lại.');
        }
      };

      const tabLabels = ['📋 Thời hạn Điều tra', '🔒 Thời hạn Tạm giam', '🔄 Phục hồi / Bổ sung'];

      return (
        <div style={{padding: '20px'}}>
          <div className="card" style={{marginBottom: '16px'}}>
            <div className="card-header">⚖️ Tính Thời Hạn Tố Tụng Hình Sự</div>
            <div className="card-body">
              <div className="form-row" style={{gridTemplateColumns: '1fr 1fr 1fr'}}>
                <div className="form-group">
                  <label className="form-label">Mã số vụ</label>
                  <select className="form-control" value={maSoVu} onChange={e => setMaSoVu(e.target.value)}>
                    <option value="">-- Chọn mã số vụ --</option>
                    {(cases || []).map(c => (
                      <option key={c.id} value={c.id}>{c.id}</option>
                    ))}
                  </select>
                </div>
                <div className="form-group">

                      <div className="search-input-wrapper">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input
                          type="text"
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          placeholder="🔍 Tìm kiếm theo mã số vụ hoặc nội dung..."
                          className="form-control"
                        />
                      </div>
                      <select
                        value={statusFilter}
                        onChange={(e) => setStatusFilter(e.target.value)}
                        className="form-control filter-select"
                        style={{width: 'auto'}}
                      >
                        <option value="all">Tất cả trạng thái</option>
                        <option value="đang thực hiện">Đang thực hiện</option>
                        <option value="hoàn thành">Hoàn thành</option>
                      </select>
                    </div>
                    
                    <div className="table-wrapper">
                    <div className="table-scroll">
                      <table className="data-table table-fixed">
                        <thead>
                          <tr>
                            <th className="fixed-width-stt">STT</th>
                            <th className="fixed-width-id">Mã Số Vụ</th>
                            <th className="fixed-width-date">Ngày Tiếp Nhận</th>
                            <th className="fixed-width-description">Nơi Xảy Ra Vụ Việc</th>
                            <th className="fixed-width-object-count">Đối Tượng</th>
                            <th className="fixed-width-phanloai">Phân Loại Tin</th>
                            <th style={{width:'90px',minWidth:'80px'}}>Trạng Thái</th>
                            <th className="fixed-width-action">Hành Động</th>
                          </tr>
                        </thead>
                        <tbody>
                          {paginatedCases.filter(c => c.status !== 'hoàn thành').map((c, index) => {
                            const isUrgent = isInvestigationRedInCase(c) || isCustodyRedInCase(c) || isDetentionRedInCase(c);
                            return (
                              <tr key={c.id} style={isUrgent ? {background: '#fff1f2'} : {}}>
                                <td className="fixed-width-stt" style={{fontWeight:600}}>{(currentPage - 1) * itemsPerPage + index + 1}</td>
                                <td className="fixed-width-id" style={{fontWeight:700,color:'#1d4ed8',whiteSpace:'nowrap'}} title={c.id}>{c.id}</td>
                                <td className="fixed-width-date" style={{whiteSpace:'nowrap'}}>{DateUtils.formatToVietnamese(c.dateReceived)}</td>
                                <td className="fixed-width-description wrap-text" style={{textAlign:'left'}} title={c.noixayra}>{c.noixayra || ''}</td>
                                <td className="fixed-width-object-count" style={{fontWeight:700,color:'#1d4ed8',fontSize:'14px'}}>
                                  {c.objects ? c.objects.length : 0}
                                </td>
                                <td className="fixed-width-phanloai wrap-text" style={{fontSize:'11px'}}>{c.phanLoaiTin || ''}</td>
                                <td style={{width:'90px',fontSize:'11px',textAlign:'center'}} className="wrap-text">{c.status}</td>
                                <td style={{padding:'4px 6px'}}>
                                  <div style={{display:'flex',gap:'3px',justifyContent:'center'}}>
                                  <button className="btn btn-primary btn-xs" onClick={() => handleEditCase(c)}>✏️ Sửa</button>
                                  <button className="btn btn-danger btn-xs" onClick={() => handleDeleteCaseConfirm(c.id)}>🗑️</button>
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div></div>
                    <div className="pagination">
                      <button className="btn btn-gray btn-sm" disabled={currentPage === 1} onClick={() => setCurrentPage(currentPage - 1)}>← Trước</button>
                      <span className="pagination-info">Trang <strong>{currentPage}</strong> / <strong>{totalPages}</strong> ({filteredCases.length} vụ việc)</span>
                      <button className="btn btn-gray btn-sm" disabled={currentPage === totalPages} onClick={() => setCurrentPage(currentPage + 1)}>Sau →</button>
                    </div>
                  </>
                )}
                
                {viewMode === 'completed' && (
                  <>
                    <div className="page-header" style={{marginBottom: '12px'}}>
                      <div className="page-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>
                        Danh Sách Vụ Việc Đã Kết Thúc
                        <span className="badge badge-done">{cases.filter(c => c.status === 'hoàn thành').length} vụ</span>
                      </div>
                    </div>
                    
                    <div className="search-bar">
                      <div className="search-input-wrapper" style={{flex: 1}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                          placeholder="🔍 Tìm kiếm vụ án đã hoàn thành..." className="form-control" />
                      </div>
                    </div>
                    
                    <div className="table-wrapper"><div className="table-scroll">
                      <table className="data-table table-fixed">
                        <thead>
                          <tr>
                            <th className="fixed-width-stt">STT</th>
                            <th className="fixed-width-id">Mã Số Vụ</th>
                            <th className="fixed-width-date">Ngày Tiếp Nhận</th>
                            <th className="fixed-width-description">Nơi Xảy Ra Vụ Việc</th>
                            <th className="fixed-width-object-count">ĐT</th>
                            <th className="fixed-width-phanloai">Phân Loại Tin</th>
                            <th style={{width:'90px',minWidth:'80px'}}>Trạng Thái</th>
                            <th className="fixed-width-action">Hành Động</th>
                          </tr>
                        </thead>
                        <tbody>
                          {paginatedCases.filter(c => c.status === 'hoàn thành').map((c, index) => (
                            <tr key={c.id}>
                              <td className="fixed-width-stt" style={{fontWeight:600}}>{(currentPage - 1) * itemsPerPage + index + 1}</td>
                              <td className="fixed-width-id" style={{fontWeight:700,color:'#15803d',whiteSpace:'nowrap'}} title={c.id}>{c.id}</td>
                              <td className="fixed-width-date" style={{whiteSpace:'nowrap'}}>{DateUtils.formatToVietnamese(c.dateReceived)}</td>
                              <td className="fixed-width-description wrap-text" style={{textAlign:'left'}} title={c.noixayra}>{c.noixayra || ''}</td>
                              <td className="fixed-width-object-count" style={{fontWeight:700,color:'#1d4ed8',fontSize:'14px'}}>{c.objects ? c.objects.length : 0}</td>
                              <td className="fixed-width-phanloai wrap-text" style={{fontSize:'11px'}}>{c.phanLoaiTin || ''}</td>
                              <td style={{width:'90px',fontSize:'11px',textAlign:'center'}} className="wrap-text">{c.status}</td>
                              <td style={{padding:'4px 6px'}}>
                                <div style={{display:'flex',gap:'3px',justifyContent:'center'}}>
                                <button className="btn btn-primary btn-xs" onClick={() => handleEditCase(c)}>✏️ Sửa</button>
                                <button className="btn btn-danger btn-xs" onClick={() => handleDeleteCaseConfirm(c.id)}>🗑️</button>
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div></div>
                    <div className="pagination">
                      <button className="btn btn-gray btn-sm" disabled={currentPage === 1} onClick={() => setCurrentPage(currentPage - 1)}>← Trước</button>
                      <span className="pagination-info">Trang <strong>{currentPage}</strong> / <strong>{totalPages}</strong></span>
                      <button className="btn btn-gray btn-sm" disabled={currentPage === totalPages} onClick={() => setCurrentPage(currentPage + 1)}>Sau →</button>
                    </div>
                  </>
                )}
                
                {/* Undo Toast */}
                {undoData && (
                  <div className="undo-toast">
                    <span>🗑️ {undoData.type === 'case' ? 'Đã xóa vụ việc' : 'Đã xóa đối tượng'}</span>
                    <button className="btn btn-primary btn-sm" onClick={undoData.type === 'case' ? handleUndoDeleteCase : () => {}}>↩️ Hoàn tác</button>
                    <button className="close" onClick={() => setUndoData(null)}>×</button>
                  </div>
                )}
                
                {/* Confirm Dialog */}
                {showConfirm && (
                  <div className="modal-overlay">
                    <div className="modal-box" style={{width: '360px'}}>
                      <div className="modal-header" style={{background: 'linear-gradient(135deg, #7f1d1d, #dc2626)'}}>
                        ⚠️ Xác nhận xóa
                        <button className="modal-close" onClick={() => { setShowConfirm(false); setDeleteCaseId(null); setDeleteIndex(null); }}>×</button>
                      </div>
                      <div className="modal-body">
                        <p style={{marginBottom: '8px', color: '#374151'}}>
                          Bạn có chắc chắn muốn xóa <strong>{deleteCaseId ? `vụ việc "${deleteCaseId}"` : 'đối tượng này'}</strong>?
                        </p>
                        <p style={{fontSize: '12px', color: '#ef4444'}}>⚠️ Hành động này không thể hoàn tác ngay lập tức (có thể hoàn tác trong 5 giây).</p>
                      </div>
                      <div className="modal-footer">
                        <button className="btn btn-gray" onClick={() => { setShowConfirm(false); setDeleteCaseId(null); setDeleteIndex(null); }}>Hủy bỏ</button>
                        <button className="btn btn-danger" onClick={deleteCaseId ? handleDeleteCase : () => {}}>🗑️ Xóa</button>
                      </div>
                    </div>
                  </div>
                )}
                
              </div>
            )}
          </div>

          {/* ── Excel Export Modal – available from any tab ── */}
          {showExportFilter && (
          <div className="modal-overlay">
            <div className="modal-box" style={{width:'520px',maxHeight:'90vh',overflowY:'auto'}}>
              <div className="modal-header" style={{background:'linear-gradient(135deg,#1d4ed8,#1e40af)'}}>
                📊 Xuất Dữ Liệu Excel
                <button className="modal-close" onClick={() => setShowExportFilter(false)}>×</button>
              </div>
              <div className="modal-body">
                <div className="form-group">
                  <label className="form-label" style={{fontWeight:700}}>Loại dữ liệu</label>
                  <select value={exportFilter} onChange={handleExportFilterChange} className="form-control">
                    <option value="both">Tất cả vụ việc</option>
                    <option value="ongoing">Đang thực hiện</option>
                    <option value="completed">Đã hoàn thành</option>
                    <option value="tinbao">Tin báo</option>
                    <option value="vuviec">Vụ việc / Vụ án (không phải tin báo)</option>
                    <option value="tomtat">Tóm tắt (STT, Ngày tiếp nhận, Loại VV, Nội dung, Đối tượng, KQ giải quyết, Thụ lý)</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label" style={{fontWeight:700}}>Mã vụ việc (lọc chính xác)</label>
                  <input type="text" value={filterCaseId} onChange={(e) => setFilterCaseId(e.target.value)}
                    className="form-control" placeholder="Để trống = lấy tất cả" />
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label className="form-label" style={{fontWeight:700}}>Từ ngày</label>
                    <input type="text" ref={filterStartDateRef} name="filterStartDate" placeholder="dd/mm/yyyy" className="form-control" readOnly style={{cursor:'pointer'}} />
                  </div>
                  <div className="form-group">
                    <label className="form-label" style={{fontWeight:700}}>Đến ngày</label>
                    <input type="text" ref={filterEndDateRef} name="filterEndDate" placeholder="dd/mm/yyyy" className="form-control" readOnly style={{cursor:'pointer'}} />
                  </div>
                </div>
                <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px',padding:'10px',fontSize:'12px',color:'#0369a1',marginTop:'8px'}}>
                  💡 File Excel gồm 3 sheet: <strong>Tổng hợp</strong> (thống kê), <strong>Vụ Việc</strong> (chi tiết), <strong>Đối Tượng</strong> (danh sách).<br/>
                  📋 Chọn <strong>"Tóm tắt"</strong> để xuất file 1 sheet gọn với các cột: STT, Ngày tiếp nhận, Loại VV, Nội dung, Đối tượng, KQ giải quyết, Người thụ lý, Người trực tiếp làm.
                </div>
              </div>
              <div className="modal-footer">
                <button className="btn btn-gray" onClick={() => setShowExportFilter(false)}>Hủy</button>
                <button className="btn btn-success" onClick={handleSubmitExport}>📥 Xuất Excel</button>
              </div>
            </div>
          </div>
          )}
        </div>
      );
    };
    
    // Render the app
    try {
      ReactDOM.render(<App />, document.getElementById('root'));
      console.log('ReactDOM.render executed successfully');
    } catch (error) {
      console.error('Error rendering React app:', error);
      document.getElementById('root').innerHTML = '<h1>Lỗi: Không thể hiển thị ứng dụng. Vui lòng kiểm tra Console.</h1>';
    }
  </script>
</body>
</html>
