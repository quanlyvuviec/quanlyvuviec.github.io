    // ==================== STATISTICS VIEW ====================
    const StatisticsView = ({ cases }) => {
      const [statConfig, setStatConfig] = React.useState({
        loaiXuat: 'both', trangThai: 'all', tuNgay: '', denNgay: '', phuong: '', khuPhoRange: '',
      });
      const [statsResult, setStatsResult] = React.useState(null);
      const [calculating, setCalculating] = React.useState(false);
      const [exporting, setExporting] = React.useState('');
      const tuNgayRef = React.useRef(null);
      const denNgayRef = React.useRef(null);

      React.useEffect(() => {
        let fp1, fp2;
        if (tuNgayRef.current) fp1 = flatpickr(tuNgayRef.current, { dateFormat: 'd/m/Y', onChange: ([d]) => { if(d) setStatConfig(c=>({...c,tuNgay:d.toISOString().slice(0,10)})); } });
        if (denNgayRef.current) fp2 = flatpickr(denNgayRef.current, { dateFormat: 'd/m/Y', onChange: ([d]) => { if(d) setStatConfig(c=>({...c,denNgay:d.toISOString().slice(0,10)})); } });
        return () => { fp1&&fp1.destroy(); fp2&&fp2.destroy(); };
      }, []);

      const parseKhuPhoRange = (s) => {
        if (!s||!s.trim()) return null;
        const set = new Set();
        s.split(',').forEach(p => { p=p.trim(); const r=p.match(/^(\d+)\s*-\s*(\d+)$/); if(r){for(let i=parseInt(r[1]);i<=parseInt(r[2]);i++)set.add(i);}else{const n=parseInt(p);if(!isNaN(n))set.add(n);} });
        return set;
      };
      const extractKhuPho = (addr) => { if(!addr) return null; const m=addr.match(/khu\s*ph[oố]\s*(\d+)/i); return m?parseInt(m[1]):null; };
      const isDrugRelated = (typeArr) => { const kw=['ma túy','ma tuy','điều 247','điều 248','điều 249','điều 250','điều 251','điều 252','điều 253','điều 254','điều 255','điều 256','điều 257','điều 258','điều 259','điều 194','điều 197','điều 198','heroin','methamphetamine','cần sa','thuốc lắc','tàng trữ','mua bán trái phép','sử dụng trái phép']; const s=(typeArr||[]).join(' ').toLowerCase(); return kw.some(k=>s.includes(k)); };
      const getCrimeCategory = (c) => { const t=Array.isArray(c.type)?c.type:[]; if(isDrugRelated(t)) return 'Ma túy'; if(t.length===0) return 'Chưa phân loại'; return t.join(', '); };
      const computeAge = (bd) => {
        if(!bd) return null;
        let yr,mo,dy;
        const iso=bd.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(iso){yr=parseInt(iso[1]);mo=parseInt(iso[2]);dy=parseInt(iso[3]);}
        else{const vn=bd.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(vn){dy=parseInt(vn[1]);mo=parseInt(vn[2]);yr=parseInt(vn[3]);}else{const y=bd.match(/(\d{4})/);if(!y)return null;return new Date().getFullYear()-parseInt(y[1]);}}
        const now=new Date(); let age=now.getFullYear()-yr; if(now.getMonth()+1<mo||(now.getMonth()+1===mo&&now.getDate()<dy))age--; return(age>=0&&age<120)?age:null;
      };

      const computeStats = () => {
        setCalculating(true);
        setTimeout(() => {
          const kpSet=parseKhuPhoRange(statConfig.khuPhoRange);
          const phuong=(statConfig.phuong||'').trim().toLowerCase();
          let filtered=cases.slice();
          if(statConfig.tuNgay) filtered=filtered.filter(c=>c.dateReceived>=statConfig.tuNgay);
          if(statConfig.denNgay) filtered=filtered.filter(c=>c.dateReceived<=statConfig.denNgay);
          if(statConfig.loaiXuat==='tinbao') filtered=filtered.filter(c=>(c.phanLoaiTin||'').toLowerCase()==='tin báo'||(c.investigationResult||'').toLowerCase()==='tin báo');
          else if(statConfig.loaiXuat==='vuviec') filtered=filtered.filter(c=>(c.phanLoaiTin||'').toLowerCase()!=='tin báo'&&(c.investigationResult||'').toLowerCase()!=='tin báo');
          if(statConfig.trangThai==='dangxuly') filtered=filtered.filter(c=>c.status!=='hoàn thành');
          else if(statConfig.trangThai==='hoanthanh') filtered=filtered.filter(c=>c.status==='hoàn thành');

          const crimeGroups={};
          filtered.forEach(c=>{const cat=getCrimeCategory(c);if(!crimeGroups[cat])crimeGroups[cat]=[];crimeGroups[cat].push(c);});

          const groupStats={};
          Object.entries(crimeGroups).forEach(([cat,caseList])=>{
            const totalCases=caseList.length;
            const khoiToCount=caseList.filter(c=>(c.investigationResult||'').toLowerCase().includes('khởi tố')).length;
            const chuyenCount=caseList.filter(c=>(c.investigationResult||'').toLowerCase().includes('chuyển hồ sơ')).length;
            const solved=totalCases>0?Math.round((khoiToCount/totalCases)*100):0;
            const allObjs=caseList.flatMap(c=>(c.objects||[]).map(o=>({...o,_caseId:c.id})));
            const kpCount={};
            let diaBanCount=0;
            allObjs.forEach(obj=>{
              const addr=obj.currentResidence||obj.permanentAddress||'';
              const kp=extractKhuPho(addr);
              const phuongOk=phuong?addr.toLowerCase().includes(phuong):true;
              const kpOk=kpSet?(kp!==null&&kpSet.has(kp)):(kp!==null);
              if(phuongOk&&kpOk){const key='Khu phố '+kp;kpCount[key]=(kpCount[key]||0)+1;diaBanCount++;}
              else{kpCount['Địa bàn khác']=(kpCount['Địa bàn khác']||0)+1;}
            });
            const genderCount={};
            allObjs.forEach(o=>{const g=o.gender||'Chưa rõ';genderCount[g]=(genderCount[g]||0)+1;});
            const eduCount={};
            allObjs.forEach(o=>{const e=o.education||'Chưa rõ';eduCount[e]=(eduCount[e]||0)+1;});
            const ageCount={};
            allObjs.forEach(o=>{const age=computeAge(o.birthDate||'');const key=age!==null?String(age)+' tuổi':'Chưa rõ';ageCount[key]=(ageCount[key]||0)+1;});
            const locCount={};
            caseList.forEach(c=>{const kp=extractKhuPho(c.noixayra||'');const key=kp!==null?'Khu phố '+kp:(c.noixayra&&c.noixayra.trim()?c.noixayra.trim().substring(0,50):'Chưa rõ');locCount[key]=(locCount[key]||0)+1;});
            groupStats[cat]={totalCases,khoiToCount,chuyenCount,solved,totalObjs:allObjs.length,diaBanCount,diaBanKhac:kpCount['Địa bàn khác']||0,kpCount,genderCount,eduCount,ageCount,locCount,caseList};
          });

          const overallTotalCases=filtered.length;
          const overallTotalObjs=filtered.flatMap(c=>c.objects||[]).length;
          const overallKhoiTo=filtered.filter(c=>(c.investigationResult||'').toLowerCase().includes('khởi tố')).length;
          const overallChuyen=filtered.filter(c=>(c.investigationResult||'').toLowerCase().includes('chuyển hồ sơ')).length;
          const overallSolved=overallTotalCases>0?Math.round((overallKhoiTo/overallTotalCases)*100):0;
          setStatsResult({groupStats,overallTotalCases,overallTotalObjs,overallKhoiTo,overallChuyen,overallSolved,kpTotal:kpSet?kpSet.size:null,phuong,filteredCases:filtered,statConfig:{...statConfig}});
          setCalculating(false);
        },80);
      };

      const exportExcel = () => {
        if(!statsResult) return;
        setExporting('excel');
        try {
          const {groupStats,filteredCases,overallTotalCases,overallTotalObjs,overallKhoiTo,overallChuyen,overallSolved,phuong:ph,statConfig:sc}=statsResult;
          const wb=XLSX.utils.book_new();
          const loaiLabel=sc.loaiXuat==='both'?'Tất cả':sc.loaiXuat==='tinbao'?'Tin báo':'Vụ việc/Vụ án';
          const ttLabel=sc.trangThai==='all'?'Tất cả':sc.trangThai==='dangxuly'?'Đang xử lý':'Đã hoàn thành';
          const dateStr=(DateUtils.formatToVietnamese(sc.tuNgay)||'--')+' đến '+(DateUtils.formatToVietnamese(sc.denNgay)||'--');
          const title='THỐNG KÊ VỤ VIỆC — '+loaiLabel.toUpperCase()+' — '+dateStr+(ph?' — Phường '+ph:'');

          // ── Sheet 1: Chi tiết từng loại tội ──

      // Donut ring chart (SVG, pure CSS-in-JS)
      const DonutChart = ({ data, size=80 }) => {
        const entries = Object.entries(data).filter(([,v])=>v>0);
        const total = entries.reduce((s,[,v])=>s+v,0);
        if(total===0) return null;
        const pal = ['#3b82f6','#ec4899','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ef4444'];
        const r=30; const cx=size/2; const cy=size/2; const circ=2*Math.PI*r;
        let offset=0;
        const slices = entries.map(([label,val],i)=>{
          const pct=val/total; const len=pct*circ; const s={offset,len,color:pal[i%pal.length],label,val,pct};
          offset+=len; return s;
        });
        return (
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <svg width={size} height={size} style={{flexShrink:0}}>
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth="10"/>
              {slices.map((s,i)=>(
                <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="10"
                  strokeDasharray={`${s.len} ${circ-s.len}`}
                  strokeDashoffset={circ/4-s.offset}
                  style={{transition:'stroke-dasharray 0.4s'}}/>
              ))}
              <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="13" fontWeight="800" fill="#1e293b">{total}</text>
            </svg>
            <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
              {slices.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px'}}>
                  <div style={{width:'8px',height:'8px',borderRadius:'50%',background:s.color,flexShrink:0}}/>
                  <span style={{color:'#374151',fontWeight:500}}>{s.label}</span>
                  <span style={{fontWeight:700,color:s.color}}>{s.val}</span>
                  <span style={{color:'#94a3b8',fontSize:'10px'}}>({Math.round(s.pct*100)}%)</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // Compact table with left-accent color strip
      const StatTable = ({ data, sortByCount=true, maxRows=10 }) => {

    // ==================== WORD EXPORT MODAL ====================
    const WordExportModal = ({ cases, onClose, addToast }) => {
      const [selectedCaseId, setSelectedCaseId] = React.useState('');
      const [selectedObjs, setSelectedObjs] = React.useState([]);
      const [templateFile, setTemplateFile] = React.useState(null);
      const [templateName, setTemplateName] = React.useState('');
      const [exporting, setExporting] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('export');

      // ── GitHub Template Library ────────────────────────────────────────
      const GH_KEY = 'vv_github_repo';
      const [ghRepo, setGhRepo] = React.useState(() => localStorage.getItem(GH_KEY) || '');
      const [ghRepoInput, setGhRepoInput] = React.useState(() => localStorage.getItem(GH_KEY) || '');
      const [ghFiles, setGhFiles] = React.useState([]);
      const [ghLoading, setGhLoading] = React.useState(false);
      const [ghError, setGhError] = React.useState('');
      const [ghFolder, setGhFolder] = React.useState('');

      // Auto-connect GitHub when library tab is opened and repo is saved
      React.useEffect(() => {
        if (activeTab === 'library' && ghRepo && ghFiles.length === 0 && !ghLoading && !ghError) {
          loadGhFiles(ghRepo, ghFolder);
        }
      }, [activeTab]);

      // Parse GitHub repo URL → API URL
      const parseGhUrl = (url) => {
        // Accept: https://github.com/user/repo  or  user/repo
        const m = url.match(/github\.com\/([^/]+\/[^/\s]+)/);
        if (m) return `https://api.github.com/repos/${m[1].replace(/\.git$/,'')}/contents`;
        const m2 = url.match(/^([a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+)$/);
        if (m2) return `https://api.github.com/repos/${m2[1]}/contents`;
        return null;
      };

      const loadGhFiles = (repoUrl, folder) => {
        const base = parseGhUrl(repoUrl);
        if (!base) { setGhError('URL không hợp lệ. Ví dụ: username/ten-repo'); return; }
        setGhLoading(true); setGhError(''); setGhFiles([]);
        const path = folder ? ('/' + folder) : '';
        fetch(base + path, { headers: { Accept: 'application/vnd.github.v3+json' } })
          .then(resp => {
            if (!resp.ok) {
              setGhError('Lỗi ' + resp.status + ': ' + (resp.status === 404 ? 'Repo không tồn tại hoặc là private' : 'Không truy cập được'));
              setGhLoading(false);
              return null;
            }
            return resp.json();
          })
          .then(items => {
            if (items !== null && items !== undefined) {
              setGhFiles(Array.isArray(items) ? items : []);
            }
            setGhLoading(false);
          })
          .catch(e => { setGhError('Không kết nối được GitHub API: ' + e.message); setGhLoading(false); });
      };

      const saveGhRepo = () => {
        localStorage.setItem(GH_KEY, ghRepoInput.trim());
        setGhRepo(ghRepoInput.trim());
        setGhFolder('');
        loadGhFiles(ghRepoInput.trim(), '');
      };

      const downloadAndUse = (file) => {
        addToast('⏳ Đang tải "' + file.name + '"...', 'info');
        fetch(file.download_url)
          .then(resp => {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.blob();
          })
          .then(blob => {
            const f = new File([blob], file.name, { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            setTemplateFile(f);
            setTemplateName(file.name);
            setActiveTab('export');
            addToast('✅ Đã tải mẫu "' + file.name + '" – chọn vụ việc rồi Xuất', 'success');
          })
          .catch(e => addToast('Lỗi tải file: ' + e.message, 'error'));
      };

      const docxFiles = ghFiles.filter(f => f.type === 'file' && f.name.endsWith('.docx'));
      const subFolders = ghFiles.filter(f => f.type === 'dir');

      // ── Virtual folder manager ────────────────────────────────────────
      const FOLDER_KEY = 'vv_folder_tree';
      const getFolderTree = () => {
        try { return JSON.parse(localStorage.getItem(FOLDER_KEY)) || { docx_templates:{_files:[]}, '1_doi_tuong':{_files:[]}, '2_bien_ban':{_files:[]} }; }
        catch { return { docx_templates:{_files:[]}, '1_doi_tuong':{_files:[]}, '2_bien_ban':{_files:[]} }; }
      };
      const [folderTree, setFolderTree] = React.useState(getFolderTree);
      const [newFolderName, setNewFolderName] = React.useState('');
      const [expandedFolders, setExpandedFolders] = React.useState({});
      const saveFolderTree = (tree) => { setFolderTree(tree); localStorage.setItem(FOLDER_KEY, JSON.stringify(tree)); };
      const addSubFolder = (parent) => {
        if (!newFolderName.trim()) { addToast('Nhập tên folder!','warning'); return; }
        const tree = {...folderTree};
        if (!tree[parent]) tree[parent] = {_files:[]};
        const safe = newFolderName.trim().replace(/[/\\:*?"<>|]/g,'_');
        if (tree[parent][safe]) { addToast('Folder đã tồn tại!','warning'); return; }
        tree[parent][safe] = {_files:[]};
        saveFolderTree(tree); setNewFolderName('');
        addToast('Đã tạo: ' + safe, 'success');
      };
      const deleteSubFolder = (parent, sub) => {
        if (!window.confirm(`Xóa folder "${sub}"?`)) return;
        const tree = {...folderTree}; delete tree[parent][sub]; saveFolderTree(tree);
      };

      // ── Export ────────────────────────────────────────────────────────
      const selectedCase = cases.find(c => c.id === selectedCaseId);
      const objects = selectedCase ? (selectedCase.objects || []) : [];
      const toggleObj = (i) => setSelectedObjs(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev,i]);

      const handleExport = () => {
        if (!selectedCase) { addToast('Vui lòng chọn vụ việc!','warning'); return; }
        if (selectedObjs.length === 0) { addToast('Vui lòng chọn ít nhất 1 đối tượng!','warning'); return; }
        if (!templateFile) { addToast('Vui lòng chọn file Word mẫu (hoặc tải từ Thư viện)!','warning'); return; }
        setExporting(true);
        exportWordTemplate(templateFile, selectedCase, objects, selectedObjs, getUnitSettings())
          .then(result => {
            setExporting(false);
            if (typeof result === 'string') { addToast(result,'error'); return; }
            const url = URL.createObjectURL(result.blob);
            const a = document.createElement('a'); a.href = url;
            const names = selectedObjs.map(function(i){ return (objects[i] && objects[i].name) || ''; }).filter(Boolean).join(' & ');
            a.download = result.filename.replace('.docx','') + ' - ' + names + '.docx';
            a.click(); URL.revokeObjectURL(url);
            addToast('Xuất file Word thành công!','success');
          })
          .catch(err => { setExporting(false); addToast('Lỗi xuất Word: ' + err.message, 'error'); });
      };

      const TABS = [
        ['export','📥 Xuất Word'],
        ['library','☁️ Thư viện GitHub'],
        ['folders','📁 Folder'],
      ];

      return (
        <div className="modal-overlay">
          <div className="modal-box" style={{width:'660px',maxHeight:'92vh',overflowY:'auto'}}>
            <div className="modal-header" style={{background:'linear-gradient(135deg,#15803d,#166534)'}}>
              📄 Xuất File Word Mẫu
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            {/* Tab bar */}
            <div style={{display:'flex',borderBottom:'2px solid #e2e8f0',background:'#f8fafc',flexWrap:'wrap'}}>
              {TABS.map(([k,lbl])=>(
                <button key={k} onClick={()=>setActiveTab(k)} style={{padding:'10px 16px',background:activeTab===k?'#fff':'transparent',fontWeight:activeTab===k?700:400,borderBottom:activeTab===k?'2px solid #15803d':'2px solid transparent',color:activeTab===k?'#15803d':'#64748b',cursor:'pointer',border:'none',fontSize:'13px',marginBottom:'-2px'}}>
                  {lbl}
                </button>
              ))}
            </div>

            <div className="modal-body">
              {/* ── TAB: XUẤT WORD ── */}
              {activeTab === 'export' && (<>
                <div className="form-group">
                  <label className="form-label">1. Chọn vụ việc</label>
                  <select className="form-control" value={selectedCaseId} onChange={e=>{setSelectedCaseId(e.target.value);setSelectedObjs([]);}}>
                    <option value="">-- Chọn vụ việc --</option>
                    {cases.map(c=><option key={c.id} value={c.id}>{c.id} — {Array.isArray(c.type)?c.type[0]:c.type}</option>)}
                  </select>
                </div>
                {objects.length > 0 && (
                  <div className="form-group">
                    <label className="form-label">2. Chọn đối tượng (thứ tự = số trong placeholder)</label>
                    <div style={{border:'1px solid #e2e8f0',borderRadius:'8px',overflow:'hidden'}}>
                      {objects.map((obj,i)=>(
                        <div key={i} onClick={()=>toggleObj(i)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',cursor:'pointer',background:selectedObjs.includes(i)?'#f0fdf4':'white',borderBottom:i<objects.length-1?'1px solid #f1f5f9':'none',transition:'all 0.15s'}}>
                          <div style={{width:'28px',height:'28px',borderRadius:'50%',background:selectedObjs.includes(i)?'#16a34a':'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',color:selectedObjs.includes(i)?'#fff':'#64748b',fontWeight:800,fontSize:'13px',flexShrink:0}}>
                            {selectedObjs.includes(i)?(selectedObjs.indexOf(i)+1):(i+1)}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:700,color:'#1e293b'}}>{obj.name||'Chưa tên'}</div>
                            <div style={{fontSize:'11px',color:'#64748b'}}>CCCD: {obj.idNumber||'N/A'} | SĐT: {obj.phoneNumber||'N/A'}</div>
                          </div>
                          {selectedObjs.includes(i)&&<span style={{color:'#16a34a',fontWeight:700}}>✓</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div className="form-group">
                  <label className="form-label">3. Chọn file Word mẫu (.docx)</label>
                  {templateName && (
                    <div style={{marginBottom:'6px',padding:'6px 10px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'6px',fontSize:'12px',color:'#15803d',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <span>☁️ Đang dùng mẫu từ thư viện: <b>{templateName}</b></span>
                      <button onClick={()=>{setTemplateFile(null);setTemplateName('');}} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'16px'}}>×</button>
                    </div>
                  )}
                  <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                    <input type="file" accept=".docx" className="form-control" style={{flex:1}} onChange={e=>{setTemplateFile(e.target.files[0]);setTemplateName('');}} />
                    <button className="btn btn-primary btn-sm" style={{whiteSpace:'nowrap'}} onClick={()=>setActiveTab('library')}>☁️ Thư viện</button>
                  </div>
                  {templateFile && !templateName && <div style={{marginTop:'6px',fontSize:'12px',color:'#15803d'}}>✓ File: {templateFile.name}</div>}
                </div>
                <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'8px',padding:'12px',fontSize:'11px',color:'#374151',lineHeight:1.6}}>
                  <div style={{fontWeight:600,color:'#1e40af',marginBottom:'4px'}}>💡 Placeholder nhanh</div>
                  {['{doituong1_ho_va_ten}','{doituong1_ho_va_ten_hoa}','{doituong1_ngay_sinh_short}','{doituong1_so_cmnd}','{ma_vu_viec}','{don_vi}','{ngay_hom_nay_short}'].map(ph=>(
                    <code key={ph} style={{background:'#dbeafe',borderRadius:'3px',padding:'1px 5px',marginRight:'4px',display:'inline-block',marginBottom:'3px'}}>{ph}</code>
                  ))}
                  <div style={{marginTop:'6px',color:'#64748b'}}>→ Xem đầy đủ trong tài liệu hướng dẫn hoặc tab <b>☁️ Thư viện</b></div>
                </div>
              </>)}

              {/* ── TAB: THƯ VIỆN GITHUB ── */}
              {activeTab === 'library' && (<>
                <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px',padding:'12px',marginBottom:'14px'}}>
                  <div style={{fontWeight:700,color:'#0369a1',fontSize:'13px',marginBottom:'8px'}}>☁️ Thư viện File Word Mẫu — GitHub</div>
                  <div style={{fontSize:'12px',color:'#374151',lineHeight:1.6,marginBottom:'10px'}}>
                    Lưu các file Word mẫu (.docx) vào một <b>GitHub repository public</b> để truy cập từ mọi nơi, mọi thiết bị mà không cần USB hay email.<br/>
                    <b>Cách tạo:</b> GitHub.com → New repository → Public → Upload file .docx → Dán URL repo vào đây.
                  </div>
                  <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                    <input
                      value={ghRepoInput}
                      onChange={e=>setGhRepoInput(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&saveGhRepo()}
                      placeholder="VD: username/ten-repo  hoặc  https://github.com/username/repo"
                      className="form-control"
                      style={{flex:1,fontSize:'12px'}}
                    />
                    <button className="btn btn-primary btn-sm" onClick={saveGhRepo} style={{whiteSpace:'nowrap'}}>🔗 Kết nối</button>
                  </div>
                  {ghRepo && <div style={{fontSize:'11px',color:'#0369a1',marginTop:'4px'}}>✓ Đã lưu — Tự động kết nối: <b>{ghRepo}</b></div>}
                  {!ghRepo && <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'4px'}}>💡 Nhập link một lần, ứng dụng sẽ tự nhớ và kết nối lần sau</div>}
                </div>

                {ghLoading && <div style={{textAlign:'center',padding:'20px',color:'#64748b'}}>⏳ Đang tải danh sách từ GitHub...</div>}
                {ghError && <div style={{padding:'10px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:'7px',color:'#991b1b',fontSize:'12px',marginBottom:'8px'}}>{ghError}</div>}

                {/* Breadcrumb folder navigation */}
                {ghRepo && !ghLoading && (
                  <div style={{marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                    <button onClick={()=>{setGhFolder('');loadGhFiles(ghRepo,'');}} style={{background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:'5px',padding:'3px 10px',fontSize:'12px',cursor:'pointer',color:'#1e40af',fontWeight:700}}>📦 Root</button>
                    {ghFolder && ghFolder.split('/').map((seg,idx,arr)=>(
                      <React.Fragment key={idx}>
                        <span style={{color:'#94a3b8'}}>›</span>
                        <button onClick={()=>{const p=arr.slice(0,idx+1).join('/');setGhFolder(p);loadGhFiles(ghRepo,p);}} style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'5px',padding:'3px 10px',fontSize:'12px',cursor:'pointer',color:'#1d4ed8'}}>{seg}</button>
                      </React.Fragment>
                    ))}
                  </div>
                )}

                {/* Subfolders */}
                {subFolders.length > 0 && (
                  <div style={{marginBottom:'8px'}}>
                    <div style={{fontSize:'12px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>📁 Thư mục con</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                      {subFolders.map(f=>(
                        <button key={f.name} onClick={()=>{const p=ghFolder?`${ghFolder}/${f.name}`:f.name;setGhFolder(p);loadGhFiles(ghRepo,p);}} style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'6px 12px',cursor:'pointer',fontSize:'12px',display:'flex',alignItems:'center',gap:'6px'}}>
                          📁 {f.name}
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {/* DOCX files */}
                {docxFiles.length > 0 ? (
                  <div>
                    <div style={{fontSize:'12px',fontWeight:600,color:'#64748b',marginBottom:'6px'}}>📄 File Word mẫu ({docxFiles.length} file)</div>
                    {docxFiles.map(f=>(
                      <div key={f.name} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',background:'#fff',border:'1px solid #e2e8f0',borderRadius:'7px',marginBottom:'6px',transition:'box-shadow 0.15s'}}>
                        <span style={{fontSize:'20px'}}>📝</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:'13px',color:'#1e293b'}}>{f.name}</div>
                          <div style={{fontSize:'11px',color:'#64748b'}}>{(f.size/1024).toFixed(1)} KB</div>
                        </div>
                        <button onClick={()=>downloadAndUse(f)} className="btn btn-success btn-sm">⬇️ Dùng mẫu này</button>
                      </div>
                    ))}
                  </div>
                ) : ghRepo && !ghLoading && !ghError && (
                  <div style={{textAlign:'center',padding:'30px',color:'#94a3b8',fontSize:'13px'}}>
                    Không có file .docx trong thư mục này.<br/>
                    <span style={{fontSize:'12px'}}>Upload file Word mẫu vào GitHub repo rồi nhấn Kết nối lại.</span>
                  </div>
                )}

                {!ghRepo && (
                  <div style={{textAlign:'center',padding:'40px 20px',color:'#94a3b8'}}>
                    <div style={{fontSize:'40px',marginBottom:'10px'}}>☁️</div>
                    <div style={{fontWeight:600,marginBottom:'6px'}}>Kết nối GitHub để dùng thư viện mẫu</div>
                    <div style={{fontSize:'12px'}}>Lưu file .docx lên GitHub → Truy cập từ mọi thiết bị, mọi nơi</div>
                  </div>
                )}
              </>)}

              {/* ── TAB: FOLDER ── */}
              {activeTab === 'folders' && (<>
                <div style={{marginBottom:'12px',fontSize:'12px',color:'#64748b',background:'#f8fafc',borderRadius:'7px',padding:'10px',border:'1px solid #e2e8f0'}}>
                  <b>📁 Folder ảo (lưu trên trình duyệt):</b> Dùng để tổ chức hồ sơ theo cấu trúc thư mục. Thêm folder con trong <b>1_doi_tuong</b> để gom tài liệu từng đối tượng.
                </div>
                {Object.entries(folderTree).map(([rootName, rootContent])=>{
                  const subs = Object.keys(rootContent).filter(k=>k!=='_files');
                  const isExp = expandedFolders[rootName];
                  return (
                    <div key={rootName} style={{marginBottom:'6px'}}>
                      <div onClick={()=>setExpandedFolders(prev=>({...prev,[rootName]:!prev[rootName]}))} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 12px',background:'#f0f9ff',borderRadius:'7px',cursor:'pointer',userSelect:'none',border:'1px solid #bae6fd'}}>
                        <span style={{fontSize:'11px',transition:'transform 0.15s',display:'inline-block',transform:isExp?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                        <span style={{fontWeight:600}}>📁 {rootName}</span>
                        <span style={{fontSize:'11px',color:'#64748b',marginLeft:'auto'}}>{subs.length} sub-folder</span>
                      </div>
                      {isExp && (
                        <div style={{paddingLeft:'18px',marginTop:'4px'}}>
                          {subs.length===0 && <div style={{fontSize:'11px',color:'#94a3b8',padding:'4px 8px'}}>Trống</div>}
                          {subs.map(sub=>(
                            <div key={sub} style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',background:'#fff',borderRadius:'5px',marginBottom:'3px',border:'1px solid #e2e8f0'}}>
                              <span>📂 {sub}</span>
                              <button onClick={()=>deleteSubFolder(rootName,sub)} className="btn btn-danger btn-xs" style={{marginLeft:'auto',fontSize:'10px',padding:'1px 7px'}}>🗑️</button>
                            </div>
                          ))}
                          {rootName==='1_doi_tuong' && (
                            <div style={{display:'flex',gap:'6px',marginTop:'6px',alignItems:'center'}}>
                              <input value={newFolderName} onChange={e=>setNewFolderName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSubFolder(rootName)} placeholder="Tên folder con..." className="form-control" style={{flex:1,height:'30px',fontSize:'12px'}} />
                              <button onClick={()=>addSubFolder(rootName)} className="btn btn-success btn-xs">+ Tạo</button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </>)}
            </div>

            <div className="modal-footer">
              <button className="btn btn-gray" onClick={onClose}>Đóng</button>
              {activeTab === 'export' && (
                <button className="btn btn-success" onClick={handleExport} disabled={exporting}>
                  {exporting ? '⏳ Đang xuất...' : '📥 Xuất File Word'}
                </button>
              )}
              {activeTab === 'library' && ghRepo && (
                <button className="btn btn-primary" onClick={()=>loadGhFiles(ghRepo,ghFolder)} disabled={ghLoading}>
                  {ghLoading ? '⏳...' : '🔄 Tải lại'}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ==================== PLACEHOLDER TOOL MODAL ====================
    const PlaceholderToolModal = ({ onClose, addToast }) => {
      const [files, setFiles] = React.useState([]);
      const [oldNum, setOldNum] = React.useState('1');
      const [newNum, setNewNum] = React.useState('2');
      const [processing, setProcessing] = React.useState(false);
      const [results, setResults] = React.useState([]);

      const handleRun = () => {
        if (files.length === 0) { addToast('Vui lòng chọn ít nhất 1 file Word!', 'warning'); return; }
        if (oldNum === newNum) { addToast('Số cũ và mới phải khác nhau!', 'warning'); return; }
        setProcessing(true); setResults([]);
        // Process files sequentially using promise chain
        const newResults = [];
        const processNext = (idx) => {
          if (idx >= files.length) {
            setProcessing(false);
            setResults(newResults);
            const okCount = newResults.filter(function(r){ return r.ok; }).length;
            if (okCount > 0) addToast('Đổi placeholder thành công ' + okCount + '/' + files.length + ' file!', 'success');
            return;
          }
          const file = files[idx];
          processPlaceholderTool(file, oldNum, newNum).then(function(res) {
            if (typeof res === 'string') {
              newResults.push({ ok: false, name: file.name, msg: res });
            } else {
              const url = URL.createObjectURL(res.blob);
              const a = document.createElement('a'); a.href = url; a.download = res.filename; a.click(); URL.revokeObjectURL(url);
              newResults.push({ ok: true, name: file.name, msg: '✅ Thay ' + res.count + ' placeholder → ' + res.filename });
            }
            processNext(idx + 1);
          });
        };
        processNext(0);
      };

      return (
        <div className="modal-overlay">
          <div className="modal-box" style={{width:'560px', maxHeight:'90vh', overflowY:'auto'}}>
            <div className="modal-header" style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)'}}>
              🔢 Đổi Số Thứ Tự Placeholder
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">
              <div style={{background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:'8px',padding:'12px',marginBottom:'14px'}}>
                <div style={{fontSize:'12px',color:'#6d28d9',fontWeight:600,marginBottom:'4px'}}>💡 Mục đích</div>
                <div style={{fontSize:'11px',color:'#374151'}}>
                  Đổi tất cả <code style={{background:'#ede9fe',padding:'1px 5px',borderRadius:'3px'}}>{'{doituong1_...}'}</code> thành <code style={{background:'#ede9fe',padding:'1px 5px',borderRadius:'3px'}}>{'{doituong2_...}'}</code> trong file Word mẫu.
                  <b> Hỗ trợ chọn nhiều file cùng lúc.</b> Mỗi file sẽ được tải về riêng.
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">File Word mẫu (.docx) — chọn nhiều file cùng lúc</label>
                <input type="file" accept=".docx" multiple className="form-control" onChange={e => setFiles(Array.from(e.target.files))} />
                {files.length > 0 && (
                  <div style={{marginTop:'6px',fontSize:'12px',color:'#5b21b6'}}>
                    {files.map((f,i) => <div key={i}>📄 {f.name}</div>)}
                  </div>
                )}
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Số thứ tự cũ</label>
                  <input type="number" min="1" max="99" className="form-control" value={oldNum} onChange={e => setOldNum(e.target.value)} />
                  <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>{'{'}{`doituong${oldNum}_...`}{'}'}</div>
                </div>
                <div className="form-group">
                  <label className="form-label">Số thứ tự mới</label>
                  <input type="number" min="1" max="99" className="form-control" value={newNum} onChange={e => setNewNum(e.target.value)} />
                  <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>{'{'}{`doituong${newNum}_...`}{'}'}</div>
                </div>
              </div>
              {results.length > 0 && (
                <div style={{marginTop:'8px'}}>
                  {results.map((r,i) => (
                    <div key={i} style={{padding:'8px 10px',borderRadius:'6px',background: r.ok ? '#f0fdf4' : '#fef2f2', border: `1px solid ${r.ok ? '#86efac' : '#fca5a5'}`, fontSize:'12px', color: r.ok ? '#15803d' : '#991b1b', marginBottom:'6px'}}>
                      <b>{r.name}</b>: {r.msg}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-gray" onClick={onClose}>Đóng</button>
              <button className="btn btn-primary" onClick={handleRun} disabled={processing}>
                {processing ? `⏳ Đang xử lý ${files.length} file...` : `🔄 Chạy thay thế (${files.length} file)`}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ObjectForm Component - FIXED VERSION
    const ObjectForm = ({ 
      objectData, 
      setObjectData, 
      tempObjects, 
      setTempObjects, 
      editingIndex, 
      setEditingIndex, 
      setShowObjectForm, 
      handleSubmitObject, 
      exportResume, 
      caseData, 
      setErrorMessage, 
      caseTypesList, 
      handlingMethodsList 
    }) => {
      const [previousValues, setPreviousValues] = useState({});
      const [currentBehavior, setCurrentBehavior] = useState('');
      const [filteredBehaviors, setFilteredBehaviors] = useState(caseTypesList);
      const [bbActiveTab, setBbActiveTab] = useState('info');
      const [wordImporting, setWordImporting] = useState(false);
      const [showHandlingDetails, setShowHandlingDetails] = useState(true);
      const wordImportRef = useRef(null);
      
      // Refs for date inputs
      const birthDateRef = useRef(null);
      const issueDateRef = useRef(null);
      const invitationDateRef = useRef(null);
      const ngayChuyenRef = useRef(null);
      const reportDateRef = useRef(null);
      const decisionDateRef = useRef(null);
      const prosecutionDateObjRef = useRef(null);
      const custodyDecisionDateRef = useRef(null);
      const detentionDecisionDateRef = useRef(null);
      
      // Store initial values on mount
      useEffect(() => {
        setPreviousValues({ ...objectData });
      }, []);

      // Auto-parse "Hoàn cảnh gia đình" → Gia đình tab
      useEffect(() => {
        if (!objectData.familyBackground) return;
        const text = objectData.familyBackground;
        // Helper: get value after label with colon, stops at newline or semicolon
        const g = (label) => { const m = text.match(new RegExp(label + '\\s*[:\\-]\\s*([^\\n;]+)', 'i')); return m ? m[1].trim() : null; };
        // Split into lines for line-by-line parsing
        const lines = text.split(/\n/);
        
        // Extract year from text
        const getYear = (s) => { const m = s.match(/(19|20)\d{2}/); return m ? m[0] : null; };
        
        // Cha fields
        const chaTen = g('Họ và tên cha') || g('Họ tên cha') || g('Tên cha');
        // Sinh năm cha: support "Sinh năm (cha):", "Sinh năm cha:", "Năm sinh (cha):"
        // FIXED: Capture any text (not just \d{4}) so values like "không rõ", "mất", "1975" all work
        let chaSinhNam = null;
        { const m = text.match(/Sinh\s+n[aă]m\s*[\(（]?\s*cha\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i)
                    || text.match(/N[aă]m\s+sinh\s*[\(（]?\s*cha\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i); if (m && m[1].trim()) chaSinhNam = m[1].trim(); }
        if (!chaSinhNam) {
          // Try line-by-line: find line with "cha" then look for sinh năm on next/same line
          let inCha = false;
          for (const l of lines) {
            const ll = l.toLowerCase();
            if (/\bcha\s*[:\-]/.test(ll)) { inCha = true; }
            if (inCha && /sinh\s+n[aă]m/i.test(ll)) {
              // Extract value after label (any text), fall back to year-only if no explicit colon value
              const afterColon = l.match(/sinh\s+n[aă]m\s*[:\-]\s*([^\n;,]+)/i);
              if (afterColon && afterColon[1].trim()) { chaSinhNam = afterColon[1].trim(); break; }
              const y = getYear(ll); if (y) { chaSinhNam = y; break; }
            }
            if (inCha && /\bm[eẹ]\s*[:\-]/.test(ll)) break;
          }
        }
        const chaNghe = g('Nghề nghiệp \\(cha\\)') || g('Nghề nghiệp cha');
        const chaNoi = g('Nơi ở hiện tại \\(cha\\)') || g('Nơi ở hiện tại cha') || g('Nơi ở \\(cha\\)') || g('Nơi ở cha');
        
        // Mẹ fields
        const meTen = g('Họ và tên mẹ') || g('Họ tên mẹ') || g('Tên mẹ');
        // FIXED: Capture any text for meSinhNam too (same logic as cha above)
        let meSinhNam = null;
        { const m = text.match(/Sinh\s+n[aă]m\s*[\(（]?\s*m[eẹ]\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i)
                    || text.match(/N[aă]m\s+sinh\s*[\(（]?\s*m[eẹ]\s*[\)）]?\s*[:\-]\s*([^\n;,]+)/i); if (m && m[1].trim()) meSinhNam = m[1].trim(); }
        if (!meSinhNam) {
          let inMe = false;
          for (const l of lines) {
            const ll = l.toLowerCase();
            if (/\bm[eẹ]\s*[:\-]/.test(ll)) { inMe = true; }
            if (inMe && /sinh\s+n[aă]m/i.test(ll)) {
              const afterColon = l.match(/sinh\s+n[aă]m\s*[:\-]\s*([^\n;,]+)/i);
              if (afterColon && afterColon[1].trim()) { meSinhNam = afterColon[1].trim(); break; }
              const y = getYear(ll); if (y) { meSinhNam = y; break; }
            }
          }
        }
        const meNghe = g('Nghề nghiệp \\(mẹ\\)') || g('Nghề nghiệp mẹ');
        const meNoi = g('Nơi ở hiện tại \\(mẹ\\)') || g('Nơi ở hiện tại mẹ') || g('Nơi ở \\(mẹ\\)') || g('Nơi ở mẹ');
        
        const upd = {};
        if (chaTen) upd.chaTen = chaTen;
        if (chaSinhNam) upd.chaSinhNam = chaSinhNam;
        if (chaNghe) upd.chaNgheNghiep = chaNghe;
        if (chaNoi) upd.chaNoiO = chaNoi;
        if (meTen) upd.meTen = meTen;
        if (meSinhNam) upd.meSinhNam = meSinhNam;
        if (meNghe) upd.meNgheNghiep = meNghe;
        if (meNoi) upd.meNoiO = meNoi;
        if (Object.keys(upd).length) setObjectData(prev => ({...prev, ...upd}));
      }, [objectData.familyBackground]);

      // Auto-sync XPHC fields to Quyết định tab
      useEffect(() => {
        if (objectData.handlingMethod === 'xử phạt hành chính' && (objectData.administrativeDecisionNumber || objectData.decisionDate)) {
          setObjectData(prev => ({
            ...prev,
            qdXphcSo: prev.administrativeDecisionNumber || prev.qdXphcSo,
            qdXphcNgay: prev.decisionDate || prev.qdXphcNgay,
          }));
        }
      }, [objectData.administrativeDecisionNumber, objectData.decisionDate]);

      // Auto-sync khởi tố bị can → Lệnh tố tụng (overwrite to stay in sync)
      useEffect(() => {
        if (objectData.handlingMethod === 'khởi tố bị can') {
          setObjectData(prev => ({
            ...prev,
            qdKtbcSo: prev.prosecutionDecisionObj || prev.qdKtbcSo,
            qdKtbcNgay: prev.prosecutionDateObj || prev.qdKtbcNgay,
          }));
        }
      }, [objectData.prosecutionDecisionObj, objectData.prosecutionDateObj]);

      // Auto-sync case prosecutionDecision/prosecutionDate → qdKtvaSo/qdKtvaNgay (always overwrite)
      useEffect(() => {
        if (caseData && caseData.prosecutionDecision !== undefined) {
          setObjectData(prev => ({ ...prev, qdKtvaSo: caseData.prosecutionDecision || prev.qdKtvaSo }));
        }
      }, [caseData && caseData.prosecutionDecision]);
      
      useEffect(() => {
        if (caseData && caseData.prosecutionDate !== undefined) {
          setObjectData(prev => ({ ...prev, qdKtvaNgay: caseData.prosecutionDate || prev.qdKtvaNgay }));
        }
      }, [caseData && caseData.prosecutionDate]);

      // Auto-generate lyLichGon
      useEffect(() => {
        const name = objectData.name || "";
        const year = objectData.birthDate ? objectData.birthDate.substring(0,4) : "";
        const permanentAddr = objectData.permanentAddress || "";
        const currentAddr = objectData.currentResidence || objectData.permanentAddress || "";
        if (name || year) {
          const parts = [];
          if (name) parts.push(name);
          const subParts = [];
          if (year) subParts.push("sinh năm: " + year);
          if (permanentAddr) subParts.push("nơi thường trú: " + permanentAddr);
          if (currentAddr) subParts.push("nơi ở hiện tại: trú " + currentAddr);
          const generated = subParts.length > 0 ? name + " (" + subParts.join(", ") + ")" : name;
          setObjectData(prev => ({...prev, lyLichGon: generated}));
        }
      }, [objectData.name, objectData.birthDate, objectData.permanentAddress, objectData.currentResidence]);

      // Auto-calculate expiration dates
      useEffect(() => {
        if (objectData.handlingMethod === 'khởi tố bị can') {
          if (objectData.custodyDecisionDate) {
            let ext = parseInt(objectData.custodyExtensionCount) || 0;
            let days = 3 + 3 * Math.min(ext, 2);
            setObjectData(prev => ({ 
              ...prev, 
              custodyExpirationDate: DateUtils.addDays(prev.custodyDecisionDate, days) 
            }));
          }
          
          if (objectData.detentionDecisionDate && objectData.crimeType) {
            let totalDays = calculateTotalDetentionDays(
              objectData.crimeType, 
              parseInt(objectData.detentionExtensionCount) || 0
            );
            setObjectData(prev => ({ 
              ...prev, 
              detentionExpirationDate: DateUtils.addDays(prev.detentionDecisionDate, totalDays) 
            }));
          }
        }
      }, [
        objectData.custodyDecisionDate, 
        objectData.custodyExtensionCount, 
        objectData.detentionDecisionDate, 
        objectData.detentionExtensionCount, 
        objectData.crimeType, 
        objectData.handlingMethod
      ]);
      
      // Warning checks
      useEffect(() => {
        const dl = DateUtils.daysLeft(objectData.detentionExpirationDate);
        const maxExt = maxDetentionExtensions[objectData.crimeType] || 0;
        const extCount = parseInt(objectData.detentionExtensionCount) || 0;
        
        if (dl <= 10 && extCount < maxExt) {
          setErrorMessage('Yêu cầu gia hạn tạm giam');
        } else if (dl <= 10 && extCount >= maxExt && caseData.status !== 'hoàn thành') {
          setErrorMessage('Yêu cầu hoàn thành vụ việc');
        } else {
          setErrorMessage(null);
        }
      }, [
        objectData.detentionExpirationDate, 
        objectData.detentionExtensionCount, 
        objectData.crimeType, 
        caseData.status
      ]);
      
      // Initialize Flatpickr instances
      useEffect(() => {
        // Destroy all existing instances first
        FlatpickrManager.destroyAll();
        
        // Create base date pickers
        FlatpickrManager.create(
          birthDateRef, 
          'birthDate', 
          objectData.birthDate,
          (dateStr) => handleObjectInputChange({ 
            target: { name: 'birthDate', value: dateStr } 
          })
        );
        
        FlatpickrManager.create(
          issueDateRef, 
          'issueDate', 
          objectData.issueDate,
          (dateStr) => handleObjectInputChange({ 
            target: { name: 'issueDate', value: dateStr } 
          })
        );

        FlatpickrManager.create(
          invitationDateRef,
          'invitationDate',
          objectData.invitationDate,
          (dateStr) => handleObjectInputChange({
            target: { name: 'invitationDate', value: dateStr }
          })
        );

        FlatpickrManager.create(
          ngayChuyenRef,
          'ngayChuyen',
          objectData.ngayChuyen,
          (dateStr) => handleObjectInputChange({
            target: { name: 'ngayChuyen', value: dateStr }
          })
        );
        
        // Create conditional date pickers based on handling method
        if (objectData.handlingMethod === 'xử phạt hành chính') {
          FlatpickrManager.create(
            reportDateRef, 
            'reportDate', 
            objectData.reportDate,
            (dateStr) => handleObjectInputChange({ 
              target: { name: 'reportDate', value: dateStr } 
            })
          );
          
          FlatpickrManager.create(
            decisionDateRef, 
            'decisionDate', 
            objectData.decisionDate,
            (dateStr) => handleObjectInputChange({ 
              target: { name: 'decisionDate', value: dateStr } 
            })
          );
        }
        
        if (objectData.handlingMethod === 'khởi tố bị can') {
          FlatpickrManager.create(
            prosecutionDateObjRef, 
            'prosecutionDateObj', 
            objectData.prosecutionDateObj,
            (dateStr) => handleObjectInputChange({ 
              target: { name: 'prosecutionDateObj', value: dateStr } 
            })
          );
          
          FlatpickrManager.create(
            custodyDecisionDateRef, 
            'custodyDecisionDate', 
            objectData.custodyDecisionDate,
            (dateStr) => handleObjectInputChange({ 
              target: { name: 'custodyDecisionDate', value: dateStr } 
            })
          );
          
          FlatpickrManager.create(
            detentionDecisionDateRef, 
            'detentionDecisionDate', 
            objectData.detentionDecisionDate,
            (dateStr) => handleObjectInputChange({ 
              target: { name: 'detentionDecisionDate', value: dateStr } 
            })
          );
        }
        
        // Cleanup on unmount
        return () => {
          FlatpickrManager.destroyAll();
        };
      }, [objectData.handlingMethod]);

      // Auto-save draft when editing an existing object
      useEffect(() => {
        if (editingIndex !== null && objectData.name) {
          try {
            sessionStorage.setItem('objectFormDraft_' + editingIndex, JSON.stringify(objectData));
          } catch(e) { /* ignore */ }
        }
      }, [objectData, editingIndex]);
      
      // FIXED: Handle input changes with proper state management
      const handleObjectInputChange = useCallback((e) => {
        const { name, value } = e.target;
        
        setObjectData(prev => {
          const newData = { ...prev };
          
          if (name === 'behavior') {
            const selectedBehaviors = value.split(',').map(b => b.trim()).filter(b => b);
            newData[name] = selectedBehaviors;
          } else if (['birthDate', 'issueDate', 'invitationDate', 'ngayChuyen', 'reportDate', 'decisionDate', 'prosecutionDateObj', 'custodyDecisionDate', 'detentionDecisionDate'].includes(name)) {
            newData[name] = DateUtils.parseFromVietnamese(value);
          } else {
            newData[name] = value;
          }
          
          return newData;
        });
      }, []);
      
      const handleCurrentBehaviorChange = useCallback((e) => {
        const value = e.target.value;
        setCurrentBehavior(value);
        setFilteredBehaviors(
          caseTypesList.filter(
            ct => ct.toLowerCase().includes(value.toLowerCase()) && 
            (!objectData.behavior || !objectData.behavior.includes(ct))
          )
        );
      }, [caseTypesList, objectData.behavior]);
      
      const addBehavior = useCallback(() => {
        if (currentBehavior && 
            caseTypesList.includes(currentBehavior) && 
            (!objectData.behavior || !objectData.behavior.includes(currentBehavior))) {
          setObjectData(prev => ({ 
            ...prev, 
            behavior: [...(prev.behavior || []), currentBehavior] 
          }));
          setCurrentBehavior('');
          setFilteredBehaviors(
            caseTypesList.filter(ct => 
              !objectData.behavior || !objectData.behavior.includes(ct)
            )
          );
        }
      }, [currentBehavior, caseTypesList, objectData.behavior]);
      
      const removeBehavior = useCallback((index) => {
        setObjectData(prev => ({
          ...prev,
          behavior: prev.behavior.filter((_, i) => i !== index)
        }));
      }, []);
      
      const handleUndoField = useCallback((name) => {
        setObjectData(prev => ({ 
          ...prev, 
          [name]: previousValues[name] || '' 
        }));
        
        // Update flatpickr if it's a date field
        if (['birthDate', 'issueDate', 'reportDate', 'decisionDate', 'prosecutionDateObj', 'custodyDecisionDate', 'detentionDecisionDate'].includes(name)) {
          FlatpickrManager.update(name, previousValues[name]);
        }
      }, [previousValues]);
      
      const renderUndoButton = useCallback((name) => {
        if (objectData[name] !== previousValues[name]) {
          return (
            <button
              className="btn btn-success btn-xs"
              onClick={() => handleUndoField(name)}
            >
              Ok
            </button>
          );
        }
        return null;
      }, [objectData, previousValues, handleUndoField]);
      
      const handleWordImport = (file) => {
        if (!file) return;
        setWordImporting(true);
        parseWordDocClientSide(file).then(function(result) {
          if (!result) {
            setErrorMessage('⚠️ Không đọc được file Word.');
            setWordImporting(false);
            if (wordImportRef.current) wordImportRef.current.value = '';
            return;
          }
          if (result.error) {
            setErrorMessage('❌ ' + result.error);
            setWordImporting(false);
            if (wordImportRef.current) wordImportRef.current.value = '';
            return;
          }
          if (result.data && Object.keys(result.data).length > 0) {
            setObjectData(function(prev){ return Object.assign({}, prev, result.data); });
            const DATE_FIELDS = ['birthDate','issueDate','invitationDate','ngayChuyen','reportDate','decisionDate','prosecutionDateObj','custodyDecisionDate','detentionDecisionDate'];
            // Use a slightly longer timeout to ensure Flatpickr useEffect has re-run
            setTimeout(function() {
              DATE_FIELDS.forEach(function(f) {
                if (result.data[f]) {
                  try { FlatpickrManager.update(f, result.data[f]); } catch(e) {}
                }
              });
            }, 300);
            const filled = Object.keys(result.data).length;
            const warns = result.warnings || [];
            let msg = '✅ Đã nhập ' + filled + ' trường từ file Word!';
            if (warns.length) msg += ' ⚠️ ' + warns.join('; ');
            setErrorMessage(msg);
            setTimeout(function(){ setErrorMessage(''); }, 6000);
          } else {
            setErrorMessage('⚠️ Không tìm được dữ liệu trong file Word. Kiểm tra định dạng file.');
          }
          setWordImporting(false);
          if (wordImportRef.current) wordImportRef.current.value = '';
        }).catch(function(err) {
          console.error('Word import error:', err);
          setErrorMessage('❌ Lỗi đọc file Word: ' + err.message);
          setWordImporting(false);
          if (wordImportRef.current) wordImportRef.current.value = '';
        });
      };

      const handlePhotoUpload = useCallback((e, photoField) => {
        const file = e.target.files[0];
        if (!file) return;
        const field = photoField || 'photo';
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const width = 113;
            const height = 151;
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const resizedBase64 = canvas.toDataURL('image/jpeg');
            setObjectData(prev => ({ ...prev, [field]: resizedBase64 }));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }, []);
      
      const exportPhoto = useCallback(() => {
        if (!objectData.photo) {
          setErrorMessage('Không có ảnh để xuất.');
          return;
        }
        
        const byteString = atob(objectData.photo.split(',')[1]);
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) {
          ia[i] = byteString.charCodeAt(i);
        }
        const blob = new Blob([ab], { type: 'image/jpeg' });
        saveAs(blob, `${objectData.name || 'anh_doi_tuong'}.jpg`);
      }, [objectData.photo, objectData.name]);
      
      const exportCompactInfo = useCallback(() => {
        if (!objectData.name) {
          setErrorMessage('Vui lòng nhập ít nhất họ tên để xuất thông tin gọn.');
          return;
        }
        
        const getBirthYear = (dateStr) => {
          if (!dateStr) return '';
          return dateStr.split('-')[0];
        };
        
        try {
          const doc = new Document({
            sections: [{
              properties: {
                page: {
                  margins: {
                    top: 1134,
                    right: 1134,
                    bottom: 1134,
                    left: 1417
                  }
                }
              },
              children: [
                new Paragraph({
                  children: [
                    new TextRun({ 
                      text: `Thông tin gọn ${objectData.name || 'Đối tượng'}`, 
                      font: { name: 'Times New Roman', fallback: 'Arial' }, 
                      size: 28, 
                      bold: true 
                    })
                  ],
                  alignment: AlignmentType.CENTER,
                  spacing: { after: 200 }
                }),
                new Paragraph({
                  children: [
                    new TextRun({ text: 'Họ tên: ', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28, bold: true }),
                    new TextRun({ text: objectData.name || '', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28 }),
                    new TextRun({ text: ' (sinh năm ', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28, bold: true }),
                    new TextRun({ text: getBirthYear(objectData.birthDate) || '', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28 }),
                    new TextRun({ text: ', nơi thường trú: ', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28, bold: true }),
                    new TextRun({ text: objectData.permanentAddress || '', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28 }),
                    new TextRun({ text: ', nơi ở hiện tại: ', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28, bold: true }),
                    new TextRun({ text: objectData.currentResidence || '', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28 }),
                    new TextRun({ text: ')', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28, bold: true })
                  ],
                  spacing: { after: 100 }
                }),
                new Paragraph({
                  children: [
                    new TextRun({ text: 'Nội dung vụ việc: ', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28, bold: true }),
                    new TextRun({ text: caseData.description || '', font: { name: 'Times New Roman', fallback: 'Arial' }, size: 28 })
                  ],
                  spacing: { after: 100 }
                })
              ]
            }]
          });
          
          Packer.toBlob(doc).then((blob) => {
            saveAs(blob, `thông tin nhanh ${objectData.name || 'Đối tượng'}.docx`);
            setShowObjectForm(false);
          }).catch(error => {
            console.error('Lỗi khi xuất thông tin gọn:', error);
            setErrorMessage('Không thể xuất file Word. Vui lòng kiểm tra dữ liệu và thử lại.');
          });
        } catch (error) {
          console.error('Lỗi khi xuất thông tin gọn:', error);
          setErrorMessage('Không thể xuất file Word. Vui lòng kiểm tra dữ liệu và thử lại.');
        }
      }, [objectData, caseData.description]);
      
      const isCustodyRed = DateUtils.daysLeft(objectData.custodyExpirationDate) <= 2 && 
        (!objectData.detentionDecisionDate || !objectData.detentionDecisionNumber);
      
      const isDetentionRed = () => {
        const dl = DateUtils.daysLeft(objectData.detentionExpirationDate);
        return dl <= 10;
      };
      
      const getDetentionColor = () => {
        const dl = DateUtils.daysLeft(objectData.detentionExpirationDate);
        return dl <= 10 ? 'text-red-500' : 'text-green-500';
      };
      
      return (
        <div className="card">
          <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span>{editingIndex !== null ? "✏️ Chỉnh Sửa Đối Tượng" : "👤 Thêm Thông Tin Đối Tượng"}</span>
            <label style={{cursor:'pointer',display:'flex',alignItems:'center',gap:'5px',background:'#1e40af',color:'#fff',padding:'4px 10px',borderRadius:'6px',fontSize:'12px',fontWeight:600}}>
              {wordImporting ? '⏳ Đang đọc...' : '📂 Nhập từ Word'}
              <input type="file" accept=".docx" ref={wordImportRef} style={{display:'none'}} onChange={(e)=>handleWordImport(e.target.files[0])} disabled={wordImporting} />
            </label>
          </div>
          <div className="card-body">
          <div className="form-row">
            <div className="flex items-center">
